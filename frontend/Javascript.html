var FE = {
  data:          [],
  building:      'P1',
  floor:         'Ground',
  moveMode:      false,
  pendingChanges:{},
  currentFilter: 'all',
  isDragging:    false,
  hasMoved:      false,
  activeMarker:  null,
  activeData:    null
};

// ── LOAD DATA ─────────────────────────────────────────────
async function feLoadData() {
  try {
    var result = await gasCall('getFireExtinguishers');
    FE.data = result || [];
    return FE.data;
  } catch(e) {
    showToast('FE load error: ' + escHtml(e.message), 'error');
    return [];
  }
}

// ── FE DASHBOARD ──────────────────────────────────────────
async function loadFEDashboard() {
  showScreen('fe-dashboard');
  setLoading(true, 'Loading FE data...');
  try {
    await feLoadData();
    var stats = await gasCall('getFEDashboardStats');
    setLoading(false);
    feRenderDashboardKPI(stats);
    feRenderTable();
    // Update month label
    var el = document.getElementById('fe-month-label');
    var now = new Date();
    if (el) el.textContent = now.toLocaleDateString('en-MY', { month:'long', year:'numeric' }) + ' inspection status';
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

function feRenderDashboardKPI(stats) {
  setText('fe-kpi-total',     stats.total     || 0);
  setText('fe-kpi-completed', stats.completed || 0);
  setText('fe-kpi-pending',   stats.pending   || 0);

  var pct    = stats.total > 0 ? (stats.completed / stats.total * 100).toFixed(1) : 0;
  var pctEl  = document.getElementById('fe-kpi-pct');
  var lblEl  = document.getElementById('fe-kpi-pct-label');
  var card   = document.getElementById('fe-kpi-completion-card');
  if (pctEl)  pctEl.textContent = pct + '%';

  if (card) {
    card.className = 'fe-kpi-card';
    if (pct >= 95)      { card.classList.add('fe-excellent'); if (lblEl) lblEl.textContent = 'Excellent'; }
    else if (pct >= 80) { card.className += ' fe-warning';   if (lblEl) lblEl.textContent = 'Attention'; }
    else                { card.classList.add('fe-failed');    if (lblEl) lblEl.textContent = 'Critical'; }
  }
}

function feSetFilter(filter) {
  FE.currentFilter = filter;
  document.querySelectorAll('.fe-chip').forEach(function(b) { b.classList.remove('active'); });
  var el = document.getElementById('fe-chip-' + filter);
  if (el) el.classList.add('active');
  feRenderTable();
}

function feRenderTable() {
  var tbody = document.getElementById('fe-table-body');
  if (!tbody) return;
  var rows = FE.data.filter(function(x) {
    if (FE.currentFilter === 'completed') return x.inspected;
    if (FE.currentFilter === 'pending')   return !x.inspected;
    return true;
  });
  tbody.innerHTML = rows.map(function(x) {
    var badge = x.inspected
      ? '<span class="fe-badge-completed">Completed</span>'
      : '<span class="fe-badge-pending">Pending</span>';
    var expiryBadge = '';
    if (x.isExpired) {
      expiryBadge = '<span style="color:#dc2626;font-weight:700;font-size:11px">&#9888; Expired</span>';
    } else if (x.expiringSoon) {
      expiryBadge = '<span style="color:#d97706;font-weight:700;font-size:11px">&#9888; ' + x.daysToExpiry + 'd left</span>';
    } else if (x.expiryDate) {
      expiryBadge = '<span style="color:#16a34a;font-size:11px">' + x.expiryDate + '</span>';
    } else {
      expiryBadge = '<span style="color:#9ca3af;font-size:11px">&mdash;</span>';
    }
    return '<tr>' +
      '<td style="font-weight:600">' + escHtml(x.feId) + '</td>' +
      '<td>' + escHtml(x.building) + '</td>' +
      '<td>' + escHtml(x.floor) + '</td>' +
      '<td>' + escHtml(x.location) + '</td>' +
      '<td>' + escHtml(x.type) + '</td>' +
      '<td>' + badge + '</td>' +
      '<td>' + expiryBadge + '</td>' +
    '</tr>';
  }).join('');
}

// ── FE MAP ────────────────────────────────────────────────
async function loadFEMap() {
  showScreen('fe-map');
  if (!FE.data.length) { setLoading(true, 'Loading map...'); await feLoadData(); setLoading(false); }
  feRenderFloors();
  feRenderMap();
}

function feSetBuilding(b) {
  FE.building = b;
  document.querySelectorAll('.fe-building-chip').forEach(function(btn) { btn.classList.remove('active'); });
  var el = document.getElementById('fe-b-' + b);
  if (el) el.classList.add('active');
  feRenderFloors();
  feRenderMap();
}

function feRenderFloors() {
  var wrap = document.getElementById('fe-floors');
  if (!wrap) return;
  wrap.innerHTML = '';
  var floors = FE.building === 'P1'
    ? [{ label:'Ground', value:'Ground' }, { label:'1st Floor', value:'1st Floor' }]
    : [{ label:'Ground', value:'Ground' }, { label:'Mezzanine', value:'Mezzanine' },
       { label:'1st Floor', value:'1st Floor' }, { label:'2nd Floor', value:'2nd Floor' }, { label:'Roof', value:'Roof' }];

  if (!floors.find(function(f) { return f.value === FE.floor; })) FE.floor = floors[0].value;

  floors.forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'fe-floor-chip' + (f.value === FE.floor ? ' active' : '');
    btn.textContent = f.label;
    btn.onclick = function() { FE.floor = f.value; feRenderFloors(); feRenderMap(); };
    wrap.appendChild(btn);
  });
}

function feGetMapImage() {
  var maps = {
    'P1|Ground':    'https://i.ibb.co/wZt8Bzs8/p1-gf.png',
    'P1|1st Floor': 'https://i.ibb.co/Y7RMwdX4/p1-1f.png',
    'P2|Ground':    'https://i.ibb.co/p6LqBnG0/p2-gf.png',
    'P2|Mezzanine': 'https://i.ibb.co/KcJFyJHW/p2-mezz.png',
    'P2|1st Floor': 'https://i.ibb.co/DgPwg3DN/p2-1f.png',
    'P2|2nd Floor': 'https://i.ibb.co/C3YCbFC3/p2-2f.png',
    'P2|Roof':      'https://i.ibb.co/BKgdY8SK/p2-roof.png'
  };
  return maps[FE.building + '|' + FE.floor] || maps['P1|Ground'];
}

function feRenderMap() {
  var mapEl = document.getElementById('fe-map-img');
  if (!mapEl) return;

  mapEl.onload = function() {
    setTimeout(function() {
      var layer = document.getElementById('fe-map-layer');
      layer.innerHTML = '';
      var rect = mapEl.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) { feRenderMap(); return; }
      var scaleX = rect.width  / (mapEl.naturalWidth  || rect.width);
      var scaleY = rect.height / (mapEl.naturalHeight || rect.height);
      var rows   = FE.data.filter(function(x) { return x.building === FE.building && x.floor === FE.floor; });
      rows.forEach(function(x) { feCreateMarker(x, scaleX, scaleY, layer, rect); });
    }, 300);
  };
  mapEl.src = feGetMapImage();
}

function feCreateMarker(x, scaleX, scaleY, layer, rect) {
  x.x = Math.max(20, Math.min(Number(x.x) || 120, rect.width  * 3));
  x.y = Math.max(20, Math.min(Number(x.y) || 120, rect.height * 3));

  var marker = document.createElement('div');
  marker.className = 'fe-marker';
  marker.style.left = (x.x * scaleX) + 'px';
  marker.style.top  = (x.y * scaleY) + 'px';
  marker.style.cursor = FE.moveMode ? 'grab' : 'pointer';

  // Label
  var label = document.createElement('div');
  label.className = 'fe-label';
  label.innerHTML = '<div style="font-weight:700;font-size:11px">' + escHtml(x.feId) + '</div>' +
    '<div style="font-size:10px;opacity:.9">' + escHtml(x.location) + '</div>';
  label.style.display = FE.moveMode ? 'block' : 'none';

  // Icon
  var img = document.createElement('img');
  img.className = 'fe-icon';
  img.draggable = false;
  if (x.inspected) {
    img.src = x.type === 'CO2' ? 'https://i.ibb.co/ksxNzhN2/green-co2.png' : 'https://i.ibb.co/Y7psLRn7/green-abc.png';
  } else {
    img.src = x.type === 'CO2' ? 'https://i.ibb.co/YFcVWZ1m/red-co2.png' : 'https://i.ibb.co/XrfNSc1B/red-abc.png';
  }

  // Click
  marker.onclick = function(e) {
    if (FE.hasMoved) { FE.hasMoved = false; return; }
    if (FE.moveMode) feShowEditSheet(x);
    else             feShowInspectSheet(x);
  };

  // Drag
  marker.onpointerdown = function(e) {
    if (!FE.moveMode) return;
    e.preventDefault();
    FE.isDragging  = true;
    FE.hasMoved    = false;
    FE.activeMarker = marker;
    FE.activeData   = x;
    marker.style.zIndex = '9999';
    marker.style.cursor = 'grabbing';
  };

  marker.appendChild(label);
  marker.appendChild(img);
  layer.appendChild(marker);
}

// Global drag handlers
document.addEventListener('pointermove', function(e) {
  if (!FE.isDragging || !FE.activeMarker) return;
  e.preventDefault();
  var mapEl = document.getElementById('fe-map-img');
  if (!mapEl) return;
  var rect  = mapEl.getBoundingClientRect();
  var left  = Math.max(20, Math.min(e.clientX - rect.left,  rect.width  - 20));
  var top   = Math.max(20, Math.min(e.clientY - rect.top,   rect.height - 20));
  FE.activeMarker.style.left = left + 'px';
  FE.activeMarker.style.top  = top  + 'px';
  FE.hasMoved = true;
});

document.addEventListener('pointerup', function(e) {
  if (!FE.isDragging || !FE.activeMarker || !FE.activeData) return;
  FE.isDragging = false;
  var mapEl = document.getElementById('fe-map-img');
  if (!mapEl) return;
  var rect   = mapEl.getBoundingClientRect();
  var left   = parseFloat(FE.activeMarker.style.left);
  var top    = parseFloat(FE.activeMarker.style.top);
  var realX  = Math.round((left  / rect.width)  * (mapEl.naturalWidth  || rect.width));
  var realY  = Math.round((top   / rect.height) * (mapEl.naturalHeight || rect.height));
  FE.activeData.x = realX;
  FE.activeData.y = realY;
  FE.pendingChanges[FE.activeData.feId] = { x: realX, y: realY };
  FE.activeMarker.style.zIndex = '';
  FE.activeMarker.style.cursor = 'grab';
  FE.activeMarker = null;
  FE.activeData   = null;
  // Show save button
  var saveBtn = document.getElementById('fe-save-btn');
  if (saveBtn) saveBtn.style.display = 'flex';
});

function feToggleMove() {
  FE.moveMode = !FE.moveMode;
  var btn = document.getElementById('fe-move-btn');
  if (btn) btn.style.background = FE.moveMode ? '#ea580c' : '#1a56db';
  document.querySelectorAll('.fe-label').forEach(function(el) {
    el.style.display = FE.moveMode ? 'block' : 'none';
  });
  document.querySelectorAll('.fe-marker').forEach(function(el) {
    el.style.cursor = FE.moveMode ? 'grab' : 'pointer';
  });
}

async function feSaveAllPositions() {
  var ids = Object.keys(FE.pendingChanges);
  if (!ids.length) { showToast('No changes to save', 'info'); return; }
  setLoading(true, 'Saving positions...');
  try {
    for (var i = 0; i < ids.length; i++) {
      await gasCall('updateFEPosition', ids[i], FE.pendingChanges[ids[i]].x, FE.pendingChanges[ids[i]].y);
    }
    FE.pendingChanges = {};
    var saveBtn = document.getElementById('fe-save-btn');
    if (saveBtn) saveBtn.style.display = 'none';
    setLoading(false);
    showToast('Positions saved', 'success');
    await feLoadData();
    feRenderMap();
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

async function feSaveEditDetails(feId) {
  var newFeId  = (document.getElementById('fe-edit-id')       ? document.getElementById('fe-edit-id').value.trim()   : feId) || feId;
  var building = document.getElementById('fe-edit-building').value;
  var floor    = document.getElementById('fe-edit-floor').value;
  var location = document.getElementById('fe-edit-location').value;

  if (!newFeId) { showToast('FE ID cannot be empty', 'error'); return; }
  var expiryDate = document.getElementById('fe-edit-expiry') ? document.getElementById('fe-edit-expiry').value : '';

  setLoading(true, 'Saving...');
  try {
    await gasCall('updateFEDetails', feId, building, floor, location, newFeId, expiryDate);
    setLoading(false);
    feCloseSheet();
    showToast('FE updated', 'success');
    await feLoadData();
    feRenderMap();
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

// ── FE INSPECTION FORM ────────────────────────────────────
function feStartInspection(feId) {
  var fe = null;
  for (var i = 0; i < FE.data.length; i++) { if (FE.data[i].feId === feId) { fe = FE.data[i]; break; } }
  if (!fe) { showToast('FE not found', 'error'); return; }

  var page = document.getElementById('screen-fe-inspect');
  page.className = 'open';
  document.getElementById('fe-inspect-title').textContent = fe.feId;
  document.getElementById('fe-inspect-sub').textContent   = fe.location + ' | ' + fe.building + ' ' + fe.floor;

  var gaugeField = fe.type === 'CO2'
    ? '<div class="fe-choice-row">' +
        '<button type="button" class="fe-choice-btn active" disabled>N/A (CO2)</button>' +
      '</div><input type="hidden" id="fei-pressureGauge" value="N/A (CO2)">'
    : '<div class="fe-choice-row">' +
        '<button type="button" class="fe-choice-btn active" onclick="feChoice(this,' + "'fei-pressureGauge','Good'" + ')">Good</button>' +
        '<button type="button" class="fe-choice-btn" onclick="feChoice(this,' + "'fei-pressureGauge','Low Pressure'" + ')">Low Pressure</button>' +
        '<button type="button" class="fe-choice-btn" onclick="feChoice(this,' + "'fei-pressureGauge','Over Pressure'" + ')">Over Pressure</button>' +
      '</div><input type="hidden" id="fei-pressureGauge" value="Good">';

  document.getElementById('fe-inspect-content').innerHTML =
    '<div class="fe-info-card">' +
      '<div style="font-size:16px;font-weight:700;margin-bottom:8px">' + escHtml(fe.feId) + '</div>' +
      '<div style="font-size:13px;color:var(--gray-600)">&#128205; ' + escHtml(fe.location) + '</div>' +
      '<div style="font-size:13px;color:var(--gray-600)">&#127968; ' + escHtml(fe.building) + ' &rsaquo; ' + escHtml(fe.floor) + '</div>' +
      '<div style="font-size:13px;color:var(--gray-600)">&#129519; ' + escHtml(fe.type) + '</div>' +
    '</div>' +
    feCheckCard('Physical Condition', 'fei-physicalCondition', [['Good','Good'],['Not Good','Not Good']]) +
    feCheckCard('Rivet Pin', 'fei-rivetPin', [['Present','Present'],['Missing','Missing']]) +
    '<div class="fe-check-card"><div class="fe-check-title">Pressure Gauge</div>' + gaugeField + '</div>' +
    feCheckCard('Discharge Hose / Nozzle', 'fei-dischargeHose', [['Good','Good'],['Damaged','Damaged'],['Missing','Missing']]) +
    feCheckCard('Handle', 'fei-handleCondition', [['Good','Good'],['Damaged','Damaged']]) +
    feCheckCard('Label', 'fei-labelCondition', [['Clear','Clear'],['Faded','Faded'],['Missing','Missing']]) +
    feCheckCard('Visibility', 'fei-visibility', [['Visible','Visible'],['Obstructed','Obstructed']]) +
    '<div class="fe-check-card"><div class="fe-check-title">Remarks</div>' +
      '<textarea id="fei-remarks" class="form-input" style="min-height:80px;resize:vertical" placeholder="Optional remarks..."></textarea>' +
    '</div>' +
    '<button class="btn btn-primary" style="width:100%;margin-top:4px;padding:14px" onclick="feSubmitInspection(' + "'" + fe.feId + "'" + ')">Submit Inspection</button>' +
    '<div style="height:30px"></div>';
}

function feCheckCard(title, fieldId, options) {
  var btns = options.map(function(o, i) {
    return '<button type="button" class="fe-choice-btn' + (i === 0 ? ' active' : '') + '" ' +
      'onclick="feChoice(this,' + "'" + fieldId + "','" + o[1] + "'" + ')">' + o[0] + '</button>';
  }).join('');
  return '<div class="fe-check-card">' +
    '<div class="fe-check-title">' + title + '</div>' +
    '<div class="fe-choice-row">' + btns + '</div>' +
    '<input type="hidden" id="' + fieldId + '" value="' + options[0][1] + '">' +
  '</div>';
}

function feChoice(btn, fieldId, value) {
  btn.parentElement.querySelectorAll('.fe-choice-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var el = document.getElementById(fieldId);
  if (el) el.value = value;
}

async function feSubmitInspection(feId) {
  var get = function(id) { var el = document.getElementById(id); return el ? el.value : ''; };
  var techName = APP.session ? APP.session.name : '';
  setLoading(true, 'Saving inspection...');
  try {
    var result = await gasCall('saveFEInspection', feId,
      get('fei-physicalCondition'), get('fei-rivetPin'), get('fei-pressureGauge'),
      get('fei-dischargeHose'), get('fei-handleCondition'), get('fei-labelCondition'),
      get('fei-visibility'), get('fei-remarks'), techName
    );
    setLoading(false);
    if (result && result.success) {
      showToast('Inspection saved!', 'success');
      closeFEInspect();
      feCloseSheet();
      await feLoadData();
      feRenderTable();
      feRenderMap();
    } else {
      showToast((result && result.error) || 'Save failed', 'error');
    }
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

  var el = document.getElementById('screen-fe-inspect');
  if (el) el.className = '';
}

async function loadFEReport() {
  showScreen('fe-report');
  setLoading(true, 'Loading report...');
  try {
    if (!FE.data.length) await feLoadData();
    var stats = await gasCall('getFEDashboardStats');
    setLoading(false);
    feRenderReportKPI(stats);
    feRenderBuildingSummary();
    feRenderTypeSummary();
    feRenderMonthlyTable();
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

function feRenderReportKPI(stats) {
  setText('fer-total',     stats.total     || 0);
  setText('fer-completed', stats.completed || 0);
  setText('fer-pending',   stats.pending   || 0);
  var pct  = stats.total > 0 ? (stats.completed / stats.total * 100).toFixed(1) : 0;
  var fill = document.getElementById('fer-progress-fill');
  var txt  = document.getElementById('fer-progress-text');
  var pctEl = document.getElementById('fer-pct');
  if (fill)  { fill.style.width = pct + '%'; fill.textContent = pct + '%'; }
  if (txt)   txt.textContent = pct + '% Completed';
  if (pctEl) pctEl.textContent = pct + '%';
  var card = document.getElementById('fer-pct-card');
  var lbl  = document.getElementById('fer-pct-label');
  if (card) {
    card.className = 'fe-kpi-card';
    if (pct >= 95)      { card.classList.add('fe-excellent'); if (lbl) lbl.textContent = 'Excellent'; }
    else if (pct >= 80) { card.className += ' fe-warning';   if (lbl) lbl.textContent = 'Attention'; }
    else                { card.classList.add('fe-failed');    if (lbl) lbl.textContent = 'Critical'; }
  }
}

function feRenderBuildingSummary() {
  var tbody = document.getElementById('fer-building-body');
  if (!tbody) return;
  var buildings = {};
  FE.data.forEach(function(x) {
    if (!buildings[x.building]) buildings[x.building] = { total: 0, completed: 0 };
    buildings[x.building].total++;
    if (x.inspected) buildings[x.building].completed++;
  });
  tbody.innerHTML = Object.keys(buildings).map(function(b) {
    var t = buildings[b].total, c = buildings[b].completed, p = t - c;
    var pct = (c / t * 100).toFixed(1);
    return '<tr><td>' + b + '</td><td>' + t + '</td><td>' + c + '</td><td>' + p + '</td><td>' + pct + '%</td></tr>';
  }).join('');
}

function feRenderTypeSummary() {
  var tbody = document.getElementById('fer-type-body');
  if (!tbody) return;
  var types = {};
  FE.data.forEach(function(x) { types[x.type] = (types[x.type] || 0) + 1; });
  tbody.innerHTML = Object.keys(types).map(function(t) {
    return '<tr><td>' + t + '</td><td>' + types[t] + '</td></tr>';
  }).join('');
}

function feRenderMonthlyTable() {
  var tbody = document.getElementById('fer-monthly-body');
  if (!tbody) return;
  var groups = {};
  FE.data.forEach(function(fe) {
    var key = fe.building + '|' + fe.floor;
    if (!groups[key]) groups[key] = { building: fe.building, floor: fe.floor, total: 0, completed: 0 };
    groups[key].total++;
    if (fe.inspected) groups[key].completed++;
  });
  tbody.innerHTML = Object.values(groups).map(function(r) {
    var pending = r.total - r.completed;
    var pct = (r.completed / r.total * 100).toFixed(1);
    return '<tr><td>' + r.building + '</td><td>' + r.floor + '</td><td>' + r.total + '</td>' +
      '<td>' + r.completed + '</td><td>' + pending + '</td><td>' + pct + '%</td></tr>';
  }).join('');
}

async function feGeneratePDF() {
  var monthSel = document.getElementById('fer-month-sel');
  var yearSel  = document.getElementById('fer-year-sel');

  var month = monthSel
    ? parseInt(monthSel.value)
    : new Date().getMonth() + 1;

  var year = yearSel
    ? parseInt(yearSel.value)
    : new Date().getFullYear();

var plant = prompt(
  'Enter Plant (P1, P2, P3, P4)\n\nLeave blank for ALL plants:',
  'ALL'
);

plant = (plant || 'ALL').toUpperCase();
  setLoading(true, 'Building PDF...');

  try {

    var data = await gasCall(
  'getFEHistoricalReport',
  month,
  year,
  plant
);

    setLoading(false);

if (!data) {
  showToast('No data returned', 'error');
  return;
}

if (data.error) {
  showToast('Error: ' + data.error, 'error');
  return;
}

feOpenPrintPDF(data, month, year, plant);

} catch (e) {

  setLoading(false);

  console.error(e);

  showToast(
    'PDF generation failed: ' + e.message,
    'error'
  );
}
}

function feOpenPrintPDF(data, month, year, plant) {
  var MONTHS = ['','January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  var now = new Date();
  var generatedStr = now.toLocaleDateString('en-MY', {day:'2-digit',month:'long',year:'numeric'});



  // Build table rows from records
  var tableRows = '';
  if (data.records && data.records.length) {
    // Group by building+floor for subtotals
    function tick(v) {
  if (!v) return '';

  return (
    v === 'Good' ||
    v === 'Present' ||
    v === 'Clear' ||
    v === 'Visible'
  ) ? '&#10003;' : '&#10007;';
}

data.records.forEach(function(r) {

  tableRows +=
    '<tr>' +

    '<td>' + escHtml(r.feId) + '</td>' +
    '<td>' + escHtml(r.location) + '</td>' +

    '<td style="text-align:center">' +
      tick(r.physicalCondition) +
    '</td>' +

    '<td style="text-align:center">' +
      tick(r.rivetPin) +
    '</td>' +

    '<td style="text-align:center">' +
      escHtml(r.pressureGauge || '') +
    '</td>' +

    '<td style="text-align:center">' +
      tick(r.dischargeHose) +
    '</td>' +

    '<td style="text-align:center">' +
      tick(r.handleCondition) +
    '</td>' +

    '<td style="text-align:center">' +
      tick(r.labelCondition) +
    '</td>' +

    '<td style="text-align:center">' +
      tick(r.visibility) +
    '</td>' +

    '<td>' +
      escHtml(r.remarks || '') +
    '</td>' +

    '</tr>';
});
  } else {
    tableRows = '<tr><td colspan="10" style="text-align:center;color:#9ca3af;padding:20px">No inspection records for this period.</td></tr>';
  }

  // Summary by building
  var buildings = {};
  (data.records || []).forEach(function(r) {
    if (!buildings[r.building]) buildings[r.building] = { pass:0, fail:0, attn:0 };
    if (r.status === 'PASS') buildings[r.building].pass++;
    else if (r.status === 'FAIL') buildings[r.building].fail++;
    else buildings[r.building].attn++;
  });
  var summaryRows = Object.keys(buildings).map(function(b) {
    var g = buildings[b];
    var total = g.pass + g.fail + g.attn;
    return '<tr><td>' + b + '</td><td>' + total + '</td>' +
      '<td style="color:#16a34a;font-weight:600">' + g.pass + '</td>' +
      '<td style="color:#dc2626;font-weight:600">' + g.fail + '</td>' +
      '<td style="color:#d97706;font-weight:600">' + g.attn + '</td>' +
      '</tr>';
  }).join('');

  var pct = data.total > 0 ? (data.completed / data.total * 100).toFixed(1) : 0;



  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
    '<title>FE Inspection Report - ' + MONTHS[month] + ' ' + year + '</title>' +
    '<style>' +

    '.kpi-box{flex:1;border:1px solid #e5e7eb;border-radius:6px;padding:10px;text-align:center}' +
    '.kpi-val{font-size:22px;font-weight:800}' +
    '.kpi-lbl{font-size:10px;color:#6b7280;margin-top:2px}' +

    'table{width:100%;border-collapse:collapse;margin-bottom:14px}' +
    'th{background:#1f2937;color:white;padding:6px 8px;text-align:left;font-size:10px;font-weight:700}' +
    'td{padding:5px 8px;border-bottom:1px solid #f3f4f6;font-size:10px}' +
    'tr:hover td{background:#f9fafb}' +
    '.notes{font-size:10px;color:#6b7280;line-height:1.6;border-top:1px solid #e5e7eb;padding-top:12px;margin-top:10px}' +
    '.sign-row{display:flex;gap:30px;margin-top:30px}' +
    '.sign-box{flex:1;border-top:1px solid #1f2937;padding-top:8px;text-align:center;font-size:10px;color:#6b7280}' +

function feInitSigPad(win, which) {
  var canvas = win.document.getElementById('sig-' + which);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');

  // Scale for device pixel ratio
  var rect   = canvas.getBoundingClientRect();
  canvas.width  = 600;
  canvas.height = 160;
  ctx.strokeStyle = '#111827';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  var ph = win.document.getElementById('ph-' + which);
  if (ph) ph.style.display = 'block';

  var drawing = false;
  var hasDrawn = false;

  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var sx = canvas.width  / r.width;
    var sy = canvas.height / r.height;
    var cx = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX);
    var cy = (e.clientY !== undefined ? e.clientY : e.touches[0].clientY);
    return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    var p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    if (ph) ph.style.display = 'none';
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    var p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    hasDrawn = true;
  }
  function end(e) { drawing = false; ctx.beginPath(); }

  // Remove old listeners by cloning
  var newCanvas = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(newCanvas, canvas);
  var c2 = win.document.getElementById('sig-' + which);
  var ctx2 = c2.getContext('2d');
  ctx2.strokeStyle = '#111827';
  ctx2.lineWidth   = 2;
  ctx2.lineCap     = 'round';
  ctx2.lineJoin    = 'round';

  c2.addEventListener('mousedown',  function(e){ drawing=true; var p=getPos2(e,c2); ctx2.beginPath(); ctx2.moveTo(p.x,p.y); if(ph)ph.style.display='none'; });
  c2.addEventListener('mousemove',  function(e){ if(!drawing)return; var p=getPos2(e,c2); ctx2.lineTo(p.x,p.y); ctx2.stroke(); ctx2.beginPath(); ctx2.moveTo(p.x,p.y); });
  c2.addEventListener('mouseup',    function(e){ drawing=false; ctx2.beginPath(); });
  c2.addEventListener('mouseleave', function(e){ drawing=false; ctx2.beginPath(); });
  c2.addEventListener('touchstart', function(e){ e.preventDefault(); drawing=true; var p=getPos2(e.touches[0],c2); ctx2.beginPath(); ctx2.moveTo(p.x,p.y); if(ph)ph.style.display='none'; }, {passive:false});
  c2.addEventListener('touchmove',  function(e){ e.preventDefault(); if(!drawing)return; var p=getPos2(e.touches[0],c2); ctx2.lineTo(p.x,p.y); ctx2.stroke(); ctx2.beginPath(); ctx2.moveTo(p.x,p.y); }, {passive:false});
  c2.addEventListener('touchend',   function(e){ drawing=false; ctx2.beginPath(); });
}

function getPos2(e, canvas) {
  var r  = canvas.getBoundingClientRect();
  var sx = canvas.width  / r.width;
  var sy = canvas.height / r.height;
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

function isCanvasEmpty(canvas) {
  var data = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
  for (var i = 3; i < data.length; i += 4) { if (data[i] > 0) return false; }
  return true;
}

function feLockAndPrint(win) {
  var signs = ['prepared','verified'];
  var missing = [];

  signs.forEach(function(which) {
    var nameEl = win.document.getElementById('name-' + which);
    var name   = nameEl ? nameEl.value.trim() : '';
    if (!name) missing.push(which === 'prepared' ? 'Prepared By' : 'Verified By');
  });

  if (missing.length) {
    win.alert('Please enter name for: ' + missing.join(', '));
    return;
  }

  // Capture each signature
  signs.forEach(function(which) {
    var canvas  = win.document.getElementById('sig-' + which);
    var nameEl  = win.document.getElementById('name-' + which);
    var dateEl  = win.document.getElementById('date-' + which);
    var wrap    = canvas ? canvas.parentNode : null;
    if (!canvas || !wrap) return;

    var name = nameEl ? nameEl.value.trim() : '';
    var dateRaw = dateEl ? dateEl.value : '';
    var dateDisp = dateRaw;
    try {
      dateDisp = new Date(dateRaw + 'T12:00:00').toLocaleDateString('en-MY', {day:'2-digit',month:'long',year:'numeric'});
    } catch(e) {}

    // White background composite
    var tmp = win.document.createElement('canvas');
    tmp.width  = canvas.width;
    tmp.height = canvas.height;
    var tCtx = tmp.getContext('2d');
    tCtx.fillStyle = '#ffffff';
    tCtx.fillRect(0, 0, tmp.width, tmp.height);
    tCtx.drawImage(canvas, 0, 0);
    var imgSrc = isCanvasEmpty(canvas) ? '' : tmp.toDataURL('image/png');

    // Replace the whole sign-box content
    var box = wrap.parentNode;
    box.innerHTML =
      '<div class="sign-label">' + (which === 'prepared' ? 'Prepared By (Person in-charge)' : 'Verified By (Supervisor)') + '</div>' +
      (imgSrc
        ? '<img class="sig-img" src="' + imgSrc + '" alt="Signature">'
        : '<div style="height:80px;border:1px solid #e5e7eb;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:12px">No signature</div>') +
      '<div style="margin-top:6px;font-size:12px;font-weight:700;color:#1f2937">' + name + '</div>' +
      '<div style="font-size:11px;color:#6b7280">' + dateDisp + '</div>';
  });

  // Hide the no-print bar and print
  var noprint = win.document.querySelector('.no-print');
  if (noprint) noprint.style.display = 'none';
  setTimeout(function() { win.print(); }, 300);
}

function feExportCSV() {
  var rows = [['FE ID','Building','Floor','Location','Type','Status']];
  FE.data.forEach(function(x) {
    rows.push([x.feId, x.building, x.floor, x.location, x.type, x.inspected ? 'Completed' : 'Pending']);
  });
  var csv = rows.map(function(r) { return r.map(function(c) {
    var s = String(c); return s.indexOf(',') >= 0 ? '"' + s + '"' : s;
  }).join(','); }).join('\r\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a'); a.href = url; a.download = 'FE_Inspection.csv'; a.click();
  URL.revokeObjectURL(url);
}

function feRenderExpiryBadge(x) {
  if (!x.expiryDate) return '';
  var label = x.isExpired
    ? '&#9888; Expired ' + Math.abs(x.daysToExpiry) + ' day' + (Math.abs(x.daysToExpiry) === 1 ? '' : 's') + ' ago'
    : x.expiringSoon
      ? '&#9888; Expires in ' + x.daysToExpiry + ' day' + (x.daysToExpiry === 1 ? '' : 's')
      : '&#10003; Valid until ' + x.expiryDate; // already DD-MM-YYYY
  var bg    = x.isExpired ? '#fef2f2' : x.expiringSoon ? '#fffbeb' : '#f0fdf4';
  var color = x.isExpired ? '#dc2626' : x.expiringSoon ? '#d97706' : '#16a34a';
  return '<div style="margin-top:8px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;background:' +
    bg + ';color:' + color + '">' + label + '</div>';
}

function feToggleExpiryEdit() {
  var displayEl = document.getElementById('fe-expiry-display');
  var editEl    = document.getElementById('fe-expiry-edit');
  var btnEl     = document.getElementById('fe-expiry-edit-btn');
  if (!displayEl || !editEl) return;
  var isEditing = editEl.style.display !== 'none';
  displayEl.style.display = isEditing ? 'block' : 'none';
  editEl.style.display    = isEditing ? 'none'  : 'block';
  if (btnEl) btnEl.textContent = isEditing ? '\u270E Edit' : '\u2715 Cancel';
}

function feClearExpiryDate() {
  var input = document.getElementById('fe-expiry-input');
  if (input) input.value = '';
}

async function feSaveExpiryDate() {
  var sheet  = document.getElementById('fe-sheet');
  var x      = sheet._feData;
  var input  = document.getElementById('fe-expiry-input');
  if (!x || !input) return;

  var newExpiry = input.value; // yyyy-MM-dd from date input, or '' if cleared

  setLoading(true, 'Saving expiry date...');
  try {
    await gasCall('updateFEDetails', x.feId, x.building, x.floor, x.location, x.feId, newExpiry);
    setLoading(false);

    // Refresh FE data and re-open sheet with updated info
    await feLoadData();

    // Find updated FE object and re-render sheet
    var updated = null;
    for (var i = 0; i < FE.data.length; i++) {
      if (FE.data[i].feId === x.feId) { updated = FE.data[i]; break; }
    }

    if (updated) {
      feShowInspectSheetWithHistory(updated);
      feRenderMap();
    }

    showToast('Expiry date saved', 'success');
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

async function feLoadHistory(feId) {
  var panel = document.getElementById('fe-history-panel');
  if (!panel) return;
  panel.innerHTML = '<div style="text-align:center;padding:12px;color:var(--gray-400)">Loading...</div>';
  try {
    var history = await gasCall('getFEInspectionHistory', feId);
    if (!history || !history.length) {
      panel.innerHTML = '<div style="text-align:center;padding:12px;color:var(--gray-400);font-size:13px">No inspection history found.</div>';
      return;
    }
    panel.innerHTML = '<div style="font-size:12px;font-weight:700;color:var(--gray-600);text-transform:uppercase;margin-bottom:8px">Last ' + history.length + ' Inspections</div>' +
      '<div class="fe-history-list">' +
        history.map(function(h) {
          var dotCls = h.status === 'PASS' ? 'pass' : h.status === 'FAIL' ? 'fail' : 'attn';
          var dateStr = h.date ? new Date(h.date).toLocaleDateString('en-MY', {day:'2-digit',month:'short',year:'numeric'}) : '–';
          return '<div class="fe-history-item">' +
            '<div class="fe-history-dot ' + dotCls + '">' + h.status.charAt(0) + '</div>' +
            '<div class="fe-history-info">' +
              '<div class="fe-history-date">' + dateStr + ' &bull; <span class="' +
                (h.status==='PASS'?'fe-badge-pass':h.status==='FAIL'?'fe-badge-fail':'fe-badge-attention') + '">' + h.status + '</span></div>' +
              '<div class="fe-history-tech">&#128100; ' + escHtml(h.technician || 'Unknown') + '</div>' +
              (h.remarks ? '<div class="fe-history-remark">"' + escHtml(h.remarks) + '"</div>' : '') +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>';
  } catch(e) {
    panel.innerHTML = '<div style="color:red;font-size:12px">Error loading history</div>';
  }
}

function feInitPeriodSelectors() {
  var mSel = document.getElementById('fer-month-sel');
  var ySel = document.getElementById('fer-year-sel');
  if (!mSel || !ySel) return;
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now = new Date();
  mSel.innerHTML = MONTHS.map(function(m,i) {
    return '<option value="' + (i+1) + '"' + (i === now.getMonth() ? ' selected' : '') + '>' + m + '</option>';
  }).join('');
  var curYr = now.getFullYear();
  ySel.innerHTML = [curYr-1, curYr].map(function(y) {
    return '<option value="' + y + '"' + (y === curYr ? ' selected' : '') + '>' + y + '</option>';
  }).join('');

async function feLoadHistoricalReport() {
  var month = document.getElementById('fer-month-sel') ? document.getElementById('fer-month-sel').value : new Date().getMonth()+1;
  var year  = document.getElementById('fer-year-sel')  ? document.getElementById('fer-year-sel').value  : new Date().getFullYear();
  setLoading(true, 'Loading historical data...');
  try {
    var data = await gasCall('getFEHistoricalReport', month, year);
    setLoading(false);
    if (!data || data.error) { showToast('Error: ' + (data && data.error), 'error'); return; }

    // Update KPIs
    feRenderReportKPI({ total: data.total, completed: data.completed, pending: data.pending, failed: data.failed });

    // Update monthly table with historical data
    var tbody = document.getElementById('fer-monthly-body');
    if (tbody && data.records) {
      var groups = {};
      data.records.forEach(function(r) {
        var key = r.building + '|' + r.floor;
        if (!groups[key]) groups[key] = { building: r.building, floor: r.floor, total: 0, pass: 0, fail: 0, attn: 0 };
        groups[key].total++;
        if (r.status === 'PASS') groups[key].pass++;
        else if (r.status === 'FAIL') groups[key].fail++;
        else groups[key].attn++;
      });
      tbody.innerHTML = Object.values(groups).map(function(r) {
        var pct = r.total > 0 ? (r.pass/r.total*100).toFixed(1) : 0;
        return '<tr><td>' + r.building + '</td><td>' + r.floor + '</td><td>' + r.total + '</td>' +
          '<td style="color:#16a34a;font-weight:600">' + r.pass + '</td>' +
          '<td style="color:#dc2626;font-weight:600">' + r.fail + '</td><td>' + pct + '%</td></tr>';
      }).join('');
    }

    var info = document.getElementById('fer-period-info');
    if (info) info.textContent = data.completed + '/' + data.total + ' inspected';
  } catch(e) {
    setLoading(false);
    showToast('Error: ' + escHtml(e.message), 'error');
  }
}

// ── 9. AUTO-DETECT FE INFO FROM ID ────────────────────────
function feAutoDetectInfo() {
  var feIdEl = document.getElementById('fe-new-id');
  if (!feIdEl || !feIdEl.value.trim()) return;
  var info = { building: 'P1', floor: 'Ground' };
  var id   = feIdEl.value.toUpperCase();
  if (id.indexOf('CO2II') >= 0 || id.indexOf('DPII') >= 0 || id.indexOf('P2') >= 0) info.building = 'P2';
  if      (id.indexOf('-MF-') >= 0 || id.indexOf('MEZZ') >= 0) info.floor = 'Mezzanine';
  else if (id.indexOf('-FF-') >= 0 || id.indexOf('-1F-') >= 0) info.floor = '1st Floor';
  else if (id.indexOf('-SF-') >= 0 || id.indexOf('-2F-') >= 0) info.floor = '2nd Floor';
  else if (id.indexOf('-RF-') >= 0 || id.indexOf('ROOF') >= 0) info.floor = 'Roof';
  var bEl = document.getElementById('fe-new-building');
  var fEl = document.getElementById('fe-new-floor');
  if (bEl) bEl.value = info.building;
  if (fEl) fEl.value = info.floor;
  showToast('Auto-detected: ' + info.building + ' ' + info.floor, 'info');
}

// ── 10. EXCEL EXPORT (SheetJS via unpkg) ──────────────────
function feExportXLSX() {
  // Load SheetJS dynamically if not present
  if (typeof XLSX !== 'undefined') {
    _feDoXLSXExport();
    return;
  }
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/xlsx/dist/xlsx.full.min.js';
  script.onload = function() { _feDoXLSXExport(); };
  script.onerror = function() { showToast('Could not load Excel library. Using CSV instead.', 'error'); feExportCSV(); };
  document.head.appendChild(script);
}

function _feDoXLSXExport() {
  var month = document.getElementById('fer-month-sel') ? parseInt(document.getElementById('fer-month-sel').value) : new Date().getMonth()+1;
  var year  = document.getElementById('fer-year-sel')  ? parseInt(document.getElementById('fer-year-sel').value)  : new Date().getFullYear();
  var MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

  var wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  var summaryRows = [
    ['Fire Extinguisher Inspection Report'],
    ['Period:', MONTHS[month] + ' ' + year],
    [],
    ['Building','Floor','Total','Completed','Pending','Completion %']
  ];
  var groups = {};
  FE.data.forEach(function(fe) {
    var key = fe.building + '|' + fe.floor;
    if (!groups[key]) groups[key] = { building: fe.building, floor: fe.floor, total: 0, completed: 0 };
    groups[key].total++;
    if (fe.inspected) groups[key].completed++;
  });
  Object.values(groups).forEach(function(r) {
    var pct = r.total > 0 ? Math.round(r.completed/r.total*100) : 0;
    summaryRows.push([r.building, r.floor, r.total, r.completed, r.total-r.completed, pct + '%']);
  });
  var ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
  ws1['!cols'] = [{wch:15},{wch:15},{wch:10},{wch:12},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Summary');

  // Sheet 2: FE List
  var listRows = [['FE ID','Building','Floor','Location','Type','Status (This Month)']];
  FE.data.forEach(function(fe) {
    listRows.push([fe.feId, fe.building, fe.floor, fe.location, fe.type, fe.inspected ? 'Completed' : 'Pending']);
  });
  var ws2 = XLSX.utils.aoa_to_sheet(listRows);
  ws2['!cols'] = [{wch:18},{wch:12},{wch:14},{wch:28},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, 'FE List');

  XLSX.writeFile(wb, 'FE_Inspection_' + MONTHS[month] + '_' + year + '.xlsx');
}

var QRL = {
  baseUrl: '',
  filtered: []
};

// Called when loadFESettings runs — populate the FE list
async function qrlInit() {
  // Get base URL first
  try {
    QRL.baseUrl = APP._webAppUrl || (APP._webAppUrl = await gasCall('getWebAppUrl'));
  } catch(e) {
    QRL.baseUrl = '';
  }
  if (!FE.data.length) await feLoadData();
  qrlFilterFE();
}

function qrlFilterFE() {
  var building = document.getElementById('qrl-building') ? document.getElementById('qrl-building').value : '';
  var floor    = document.getElementById('qrl-floor')    ? document.getElementById('qrl-floor').value    : '';

  QRL.filtered = FE.data.filter(function(fe) {
    if (building && fe.building !== building) return false;
    if (floor    && fe.floor    !== floor)    return false;
    return true;
  });

  qrlRenderList();
}

function qrlRenderList() {
  var el = document.getElementById('qrl-fe-list');
  if (!el) return;

  if (!QRL.filtered.length) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px">No FE found for selected filters.</div>';
    qrlUpdateCount();
    return;
  }

  el.innerHTML = QRL.filtered.map(function(fe) {
    var typeCls = fe.type === 'ABC' ? 'abc' : fe.type === 'CO2' ? 'co2' : 'other';
    return '<div class="qrl-fe-item" onclick="qrlToggle(this)">' +
      '<input type="checkbox" class="qrl-cb" data-feid="' + escHtml(fe.feId) + '" onclick="event.stopPropagation();qrlUpdateCount()">' +
      '<div style="flex:1;min-width:0">' +

window.addEventListener('load', function() {
  // Hide all screens initially using the master list
  SCREEN_IDS.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  var nav = document.getElementById('top-nav');
  if (nav) nav.style.display = 'none';

  setLoading(false);

  // Check for existing session (localStorage, 8-hour TTL)
  var saved = sessionLoad();

  if (saved && saved.techID && saved.name) {
    // Valid session — skip login entirely
    APP.session = saved;
    sessionTouch(); // Refresh TTL on activity
    var nameEl   = document.getElementById('nav-user-name');
    var avatarEl = document.getElementById('nav-avatar-text');
    if (nameEl)   nameEl.textContent   = saved.name;
    if (avatarEl) avatarEl.textContent = saved.name.charAt(0).toUpperCase();

    // Prefetch technicians in background
    if (!APP.technicians || !APP.technicians.length) {
      gasCall('getTechnicians').then(function(t) { if (t && Array.isArray(t)) APP.technicians = t; }).catch(function(){});
    }

    var feId = (typeof OPEN_FE_ID !== 'undefined') ? OPEN_FE_ID : '';
    if (feId) { checkFEDirectLink(); return; }
    var openAreaID  = (typeof OPEN_AREA_ID  !== 'undefined') ? OPEN_AREA_ID  : '';
    var openEquipID = (typeof OPEN_EQUIP_ID !== 'undefined') ? OPEN_EQUIP_ID : '';
    if (openAreaID) {
      handleQRDeepLink(openAreaID, openEquipID).then(function(ok) {
        if (!ok) loadMyTasksScreen();
      });
    } else {
      loadMyTasksScreen();
    }
  } else {
    // No session — check if we have a remembered user to show quick PIN step
    showScreen('login');
    var remembered = null;
    try { remembered = JSON.parse(localStorage.getItem('fmp_last_user')); } catch(e) {}
    if (remembered && remembered.techID && remembered.name) {
      // Show quick PIN step for remembered user
      loginState.selectedTech = remembered;
      var qName   = document.getElementById('quick-name');
      var qAvatar = document.getElementById('quick-avatar');
      if (qName)   qName.textContent   = remembered.name;
      if (qAvatar) qAvatar.textContent = remembered.name.charAt(0).toUpperCase();
      showStep('step-quick');
    } else {
      initLogin();
    }
  }
});

// PHOTO ATTACHMENT HANDLING
// ============================================================
APP.pendingPhotos = []; // [{name, base64, mimeType, previewUrl}]
APP.myTasks = [];
APP.myTasksCounts = { overdue: 0, pending: 0, total: 0 };
APP.myTasksSearch = '';
APP.myTasksGroupPage = 1;
APP.myTasksGroupPageSize = 5;
APP.myTasksExpanded = {};
APP.myTasksCycle = 'All';
APP.cameFromMyTasks = false;

function handlePhotoSelect(files) {
  if (!files || !files.length) return;
  Array.from(files).forEach(function(file) { addPhoto(file); });
  document.getElementById('attach-file').value = '';
}

function handlePhotoDrop(e) {
  e.preventDefault();
  var files = e.dataTransfer.files;
  if (files && files.length) Array.from(files).forEach(function(file) { addPhoto(file); });
}

function addPhoto(file) {
  if (!file.type.match(/image\/(jpeg|png|jpg)/)) {
    showToast('Only JPG/PNG images supported', 'warning'); return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showToast(file.name + ' is too large (max 5MB)', 'warning'); return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    // dataUrl = "data:image/jpeg;base64,XXXX"
    var parts  = dataUrl.split(',');
    var base64 = parts[1];
    var mime   = file.type;
    APP.pendingPhotos.push({ name: file.name, base64: base64, mimeType: mime, previewUrl: dataUrl });
    renderPhotoPreview();
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx) {
  APP.pendingPhotos.splice(idx, 1);
  renderPhotoPreview();
}

function renderPhotoPreview() {
  var el = document.getElementById('photo-preview-list');
  if (!el) return;
  if (!APP.pendingPhotos.length) { el.innerHTML = ''; return; }
  el.innerHTML = APP.pendingPhotos.map(function(p, i) {
    return '<div style="position:relative;width:72px">' +
      '<img src="' + p.previewUrl + '" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-200)">' +
      '<button onclick="removePhoto(' + i + ')" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:white;border:none;cursor:pointer;font-size:11px;line-height:18px;text-align:center;padding:0">&times;<\/button>' +
      '<div style="font-size:9px;color:var(--gray-500);text-align:center;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(p.name) + '<\/div>' +
    '<\/div>';
  }).join('');
}

function clearPhotoPreview() {
  APP.pendingPhotos = [];
  renderPhotoPreview();
}


// ============================================================
// FAST QR DEEP LINK — single batch call replaces 4 round trips
// ============================================================
async function handleQRDeepLink(openAreaID, openEquipID) {
  setLoading(true, 'Loading...');
  try {
    var dl = await gasCall('getQRDeepLink', openAreaID, openEquipID || '', APP.selectedDate);
    if (!dl || dl.error) throw new Error((dl && dl.error) || 'Deep link failed');

    APP.plants = dl.plants || [];
    if (dl.technicians && dl.technicians.length) APP.technicians = dl.technicians;

    var foundArea = null;
    (dl.areas || []).forEach(function(a){ if (a.areaID === openAreaID) foundArea = a; });
    if (!foundArea) throw new Error('Area not found');

    for (var pi = 0; pi < APP.plants.length; pi++) {
      if (APP.plants[pi].plantID === foundArea.plantID) { APP.currentPlant = APP.plants[pi]; break; }
    }
    APP.currentArea     = foundArea;
    APP.areas           = dl.areas;
    APP.equipWithStatus = dl.equipWithStatus || [];
    APP.cache.areasTs[openAreaID + '_' + APP.selectedDate] = Date.now();

    showScreen('equipment');
    renderEquipmentScreen();
    setLoading(false);

    if (openEquipID) {
      var foundEquip = null;
      for (var ei = 0; ei < APP.equipWithStatus.length; ei++) {
        if (APP.equipWithStatus[ei].equipID === openEquipID) { foundEquip = APP.equipWithStatus[ei]; break; }
      }
      if (foundEquip) openInspectionFormPreloaded(foundEquip, dl.templates);
    }
    return true;
  } catch(e) {
    setLoading(false);
    console.log('Deep link error:', e);
    return false;
  }
}

// Open inspection form using already-loaded templates — zero round trips
function openInspectionFormPreloaded(equip, templates) {
  APP.currentEquip      = equip;
  APP.currentInspection = { details: {} };
  APP.templates         = templates || [];
  clearPhotoPreview();
  showScreen('form');
  renderInspectionForm();
}


// ============================================================
// SESSION MANAGEMENT — localStorage with 8-hour TTL
// ============================================================
var SESSION_TTL = 8 * 60 * 60 * 1000; // 8 hours
var SESSION_KEY = 'fmp_session_v2';

function sessionSave(data) {
  try {
    var payload = JSON.stringify({ data: data, ts: Date.now() });
    localStorage.setItem(SESSION_KEY, payload);
  } catch(e) {}
}

function sessionLoad() {
  try {
    var raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    var obj = JSON.parse(raw);
    if (!obj || !obj.data || !obj.ts) return null;
    if (Date.now() - obj.ts > SESSION_TTL) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return obj.data;
  } catch(e) { return null; }
}

function sessionClear() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}

function sessionTouch() {
  // Refresh the timestamp so active users don't get logged out
  try {
    var raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return;
    var obj = JSON.parse(raw);
    if (obj) { obj.ts = Date.now(); localStorage.setItem(SESSION_KEY, JSON.stringify(obj)); }
  } catch(e) {}
}

function switchUser() {
  // Keep remembered user info but force PIN re-entry with name selection
  loginState = { selectedTech: null, pin: '' };
  initLogin();
}


// ============================================================
// MY TASKS TODAY
// ============================================================
async function loadMyTasksScreen(plantID) {
  sessionTouch();
  showScreen('mytasks');
  setLoading(true, 'Loading your tasks...');
  try {
    var data = await gasCall('getMyTasksToday', plantID || '');
    if (!data || data.error) throw new Error((data && data.error) || 'Failed to load tasks');
    APP.myTasks = data.tasks || [];
    APP.myTasksCounts = data.counts || { overdue: 0, pending: 0, total: 0 };
    APP.myTasksSearch = '';
    APP.myTasksGroupPage = 1;
    APP.myTasksExpanded = {};
    APP.myTasksCycle = 'All';

    var searchEl = document.getElementById('mt-search');
    if (searchEl) searchEl.value = '';

    var filterSel = document.getElementById('mt-plant-filter');
    if (filterSel && filterSel.options.length <= 1 && data.plants) {
      filterSel.innerHTML = '<option value="">All Plants</option>' +
        data.plants.map(function(p){ return '<option value="' + p.plantID + '">' + escHtml(p.plantName) + '</option>'; }).join('');
    }
    if (filterSel) filterSel.value = plantID || '';

    renderMyTasksScreen();

    var badgeEl = document.getElementById('sidebar-mytasks-badge');
    if (badgeEl) {
      if (data.counts.total > 0) { badgeEl.style.display = 'inline-block'; badgeEl.textContent = data.counts.total; }
      else badgeEl.style.display = 'none';
    }

    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load tasks: ' + e.message, 'error');
  }
}

function mtFilterTasks(value) {
  APP.myTasksSearch = (value || '').trim().toLowerCase();
  APP.myTasksGroupPage = 1;
  renderMyTasksScreen();
}

// Buckets the many inspectionCycle values into 4 simple groups for tabs
function mtCycleBucket(cycle) {
  if (cycle === 'Daily') return 'Daily';
  if (cycle === 'Weekly' || cycle === 'Bi-Weekly' || cycle === 'Semi-Monthly') return 'Weekly';
  if (cycle === 'Monthly') return 'Monthly';
  return 'Other'; // Quarterly, Semi-Annual, Annual, anything else
}

function mtGetFilteredTasks() {
  var tasks = APP.myTasks;

  if (APP.myTasksCycle && APP.myTasksCycle !== 'All') {
    tasks = tasks.filter(function(t) { return mtCycleBucket(t.inspectionCycle) === APP.myTasksCycle; });
  }

  var term = APP.myTasksSearch;
  if (term) {
    tasks = tasks.filter(function(t) {
      return (t.equipmentName && t.equipmentName.toLowerCase().indexOf(term) >= 0) ||
             (t.assetTag && t.assetTag.toLowerCase().indexOf(term) >= 0);
    });
  }

  return tasks;
}

function mtRenderCycleTabs() {
  var el = document.getElementById('mt-cycle-tabs');
  if (!el) return;

  var buckets = { Daily: 0, Weekly: 0, Monthly: 0, Other: 0 };
  APP.myTasks.forEach(function(t) { buckets[mtCycleBucket(t.inspectionCycle)]++; });

  var order = ['All', 'Daily', 'Weekly', 'Monthly', 'Other'];
  var html = order.map(function(key) {
    var count = key === 'All' ? APP.myTasks.length : buckets[key];
    if (key !== 'All' && count === 0) return ''; // hide empty cycle tabs
    var activeCls = (APP.myTasksCycle === key) ? ' active' : '';
    return '<button class="cl-tab' + activeCls + '" onclick="mtSelectCycle(\'' + key + '\')">' +
      escHtml(key) + ' (' + count + ')' +
    '</button>';
  }).join('');

  el.innerHTML = html;
}

function mtSelectCycle(bucket) {
  APP.myTasksCycle = bucket;
  APP.myTasksGroupPage = 1;
  renderMyTasksScreen();
}

function mtGroupTasks(tasks) {
  var groups = {};
  tasks.forEach(function(t) {
    if (!groups[t.areaID]) {
      groups[t.areaID] = { areaID: t.areaID, areaName: t.areaName, plantName: t.plantName, overdue: 0, pending: 0, tasks: [] };
    }
    var g = groups[t.areaID];
    if (t.equipStatus === 'Overdue') g.overdue++; else g.pending++;
    g.tasks.push(t);
  });
  var list = Object.values(groups);
  list.sort(function(a, b) {
    if (b.overdue !== a.overdue) return b.overdue - a.overdue;
    if (b.pending !== a.pending) return b.pending - a.pending;
    return a.areaName.localeCompare(b.areaName);
  });
  return list;
}

function renderMyTasksScreen() {
  var counts = APP.myTasksCounts || { overdue: 0, pending: 0, total: 0 };
  document.getElementById('mt-overdue-count').textContent = counts.overdue;
  document.getElementById('mt-pending-count').textContent = counts.pending;
  document.getElementById('mt-total-count').textContent   = counts.total;

  mtRenderCycleTabs();

  var container = document.getElementById('mytasks-list');
  var pagWrap = document.getElementById('mytasks-pagination');
  if (!container) return;

  if (!APP.myTasks.length) {
    var tabsEl = document.getElementById('mt-cycle-tabs');
    if (tabsEl) tabsEl.innerHTML = '';
    if (pagWrap) pagWrap.style.display = 'none';
    container.innerHTML = '<div class="empty-state">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--gray-300);margin:0 auto 12px;display:block"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>' +
      '<h3>All caught up!</h3><p>No pending or overdue inspections right now.</p>' +
    '</div>';
    return;
  }

  var filtered = mtGetFilteredTasks();
  var searchActive = !!APP.myTasksSearch;

  if (!filtered.length) {
    if (pagWrap) pagWrap.style.display = 'none';
    var emptyMsg = searchActive
      ? 'No equipment matches your search.'
      : 'Nothing pending in this category right now.';
    container.innerHTML = '<div class="empty-state">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--gray-300);margin:0 auto 12px;display:block"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>' +
      '<h3>No matches</h3><p>' + emptyMsg + '</p>' +
    '</div>';
    return;
  }

  var groups = mtGroupTasks(filtered);
  var pageSize = APP.myTasksGroupPageSize || 5;
  var totalPages = Math.max(1, Math.ceil(groups.length / pageSize));
  if (APP.myTasksGroupPage > totalPages) APP.myTasksGroupPage = totalPages;
  var page = APP.myTasksGroupPage;
  var start = (page - 1) * pageSize;
  var pageGroups = groups.slice(start, start + pageSize);

  // Auto-expand the first group on page 1 the first time (before any user toggle)
  if (page === 1 && Object.keys(APP.myTasksExpanded).length === 0 && pageGroups.length) {
    APP.myTasksExpanded[pageGroups[0].areaID] = true;
  }

  container.innerHTML = pageGroups.map(function(g) {
    var isOpen = searchActive || !!APP.myTasksExpanded[g.areaID];
    var pills = '';
    if (g.overdue > 0) pills += '<span class="badge badge-red">' + g.overdue + ' overdue</span>';
    if (g.pending > 0) pills += '<span class="badge badge-orange">' + g.pending + ' pending</span>';

    var rows = g.tasks.map(function(t) { return renderTaskRow(t); }).join('');

    return '<div class="mt-group' + (isOpen ? ' open' : '') + '" data-area="' + escHtml(g.areaID) + '">' +
      '<div class="mt-group-header" onclick="mtToggleGroup(\'' + g.areaID + '\')">' +
        '<svg class="mt-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
        '<div class="mt-group-title">' + escHtml(g.areaName) + ' <span>\u2014 ' + escHtml(g.plantName) + '</span></div>' +
        pills +
      '</div>' +
      '<div class="mt-group-body">' + rows + '</div>' +
    '</div>';
  }).join('');

  // Pagination
  if (pagWrap) {
    if (groups.length > pageSize) {
      pagWrap.style.display = 'flex';
      var infoEl = document.getElementById('mt-page-info');
      var gStart = start + 1, gEnd = Math.min(start + pageSize, groups.length);
      if (infoEl) infoEl.textContent = 'Showing areas ' + gStart + '-' + gEnd + ' of ' + groups.length;

      var btns = '<button class="pg-btn" onclick="mtChangeGroupPage(' + (page - 1) + ')" ' + (page === 1 ? 'disabled' : '') + '>\u2039 Previous</button>';
      for (var i = 1; i <= totalPages; i++) {
        btns += '<button class="pg-btn pg-num ' + (i === page ? 'active' : '') + '" onclick="mtChangeGroupPage(' + i + ')">' + i + '</button>';
      }
      btns += '<button class="pg-btn" onclick="mtChangeGroupPage(' + (page + 1) + ')" ' + (page === totalPages ? 'disabled' : '') + '>Next \u203A</button>';
      var btnsEl = document.getElementById('mt-page-btns');
      if (btnsEl) btnsEl.innerHTML = btns;
    } else {
      pagWrap.style.display = 'none';
    }
  }
}

function mtToggleGroup(areaID) {
  APP.myTasksExpanded[areaID] = !APP.myTasksExpanded[areaID];
  var el = document.querySelector('.mt-group[data-area="' + areaID + '"]');
  if (el) el.classList.toggle('open', !!APP.myTasksExpanded[areaID]);
}

function mtChangeGroupPage(page) {
  APP.myTasksGroupPage = page;
  renderMyTasksScreen();
}

function renderTaskRow(t) {
  var isOverdue = t.equipStatus === 'Overdue';
  var iconCls = isOverdue ? 'overdue' : 'pending';
  var iconSvg = isOverdue
    ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>'
    : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';

  var metaParts = [escHtml(t.assetTag || '\u2013'), escHtml(t.inspectionCycle)];
  if (t.lastInspection) {
    metaParts.push('Last: ' + escHtml(formatDate(t.lastInspection)));
  } else {
    metaParts.push('Never inspected');
  }
  var metaCls = 'mt-task-meta';
  if (isOverdue && t.daysOverdue) {
    metaParts.push(t.daysOverdue + ' day' + (t.daysOverdue === 1 ? '' : 's') + ' overdue');
    metaCls += ' overdue-text';
  } else if (isOverdue && !t.lastInspection) {
    metaCls += ' overdue-text';
  }

  return '<div class="mt-task-row">' +
    '<div class="mt-task-icon ' + iconCls + '">' + iconSvg + '</div>' +
    '<div class="mt-task-info">' +
      '<div class="mt-task-name">' + escHtml(t.equipmentName) + '</div>' +
      '<div class="' + metaCls + '">' + metaParts.join(' \u00B7 ') + '</div>' +
    '</div>' +
    '<button class="mt-inspect-btn" onclick="openTaskInspection(\'' + t.equipID + '\')">Inspect</button>' +
  '</div>';
}

async function openTaskInspection(equipID) {
  var task = null;
  for (var i = 0; i < APP.myTasks.length; i++) {
    if (APP.myTasks[i].equipID === equipID) { task = APP.myTasks[i]; break; }
  }
  if (!task) { showToast('Task not found', 'error'); return; }

  setLoading(true, 'Loading inspection form...');
  try {
    APP.currentPlant = { plantID: task.plantID, plantName: task.plantName };
    APP.currentArea  = { areaID:  task.areaID,  areaName:  task.areaName, plantID: task.plantID };
    APP.cameFromMyTasks = true;

    var equip = {
      equipID: task.equipID, areaID: task.areaID, equipmentName: task.equipmentName,
      assetTag: task.assetTag, inspectionCycle: task.inspectionCycle, category: task.category,
      equipStatus: task.equipStatus, lastInspection: task.lastInspection
    };
    var templates = await gasCall('getTemplates', task.equipID);
    setLoading(false);
    openInspectionFormPreloaded(equip, templates);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load form: ' + e.message, 'error');
  }
}

</script>
