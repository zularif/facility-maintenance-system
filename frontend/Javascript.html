<script>

// ============================================================
// FACTORY MAINTENANCE PLATFORM v4.0 — Javascript.html
// Fixed: escaped <\/svg> in JS strings, fixed <triangle> SVG
// ============================================================

// ── APP STATE ────────────────────────────────────────────────
const APP = {
  session: null,
  plants: [], areas: [], equipment: [],
  currentPlant: null, currentArea: null, currentEquip: null, currentInspection: null,
  dashStats: {}, plantStats: {}, areaStats: {},
  equipWithStatus: [], templates: [], technicians: [],
  areaPage: 1, areaPageSize: 6,
  equipPage: 1, equipPageSize: 6,
  equipSearch: '', equipStatusFilter: '', equipCycleFilter: '',
  equipViewMode: 'grid',
  selectedDate: (function() {
    var d = new Date();
    // Use local date string (not UTC) to match server timezone
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  })(),
  checklist: [],
  clGroupBy: 'cycle',
  clSearch: '',
  clCycleFilter: 'All',
  allPlantStats: {},
  cache: { plantsTs: 0, areasTs: {}, checklistTs: {} },
  CACHE_TTL: 120000,
};

// ── SCREENS ───────────────────────────────────────────────────
var SCREEN_IDS = ['login-screen', 'screen-mytasks', 'screen-plants', 'screen-areas', 'screen-equipment', 'screen-form', 'screen-checklist', 'screen-dashboard', 'screen-fe-dashboard', 'screen-fe-map', 'screen-fe-report', 'screen-fe-settings'];
var SCREEN_MAP = {
  login:       'login-screen',
  mytasks:     'screen-mytasks',
  plants:      'screen-plants',
  areas:       'screen-areas',
  equipment:   'screen-equipment',
  form:        'screen-form',
  checklist:   'screen-checklist',
  dashboard:      'screen-dashboard',
  'fe-dashboard': 'screen-fe-dashboard',
  'fe-map':       'screen-fe-map',
  'fe-report':    'screen-fe-report',
  'fe-settings':  'screen-fe-settings'
};

function showScreen(name) {
  // Hide all screens
  SCREEN_IDS.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  var nav = document.getElementById('top-nav');
  var app = document.getElementById('app');

  if (name === 'login') {
    if (nav) nav.style.display = 'none';
    if (app) app.style.marginTop = '0';
    var loginEl = document.getElementById('login-screen');
    if (loginEl) loginEl.style.display = 'flex';
  } else {
    if (nav) nav.style.display = 'flex';
    if (app) app.style.marginTop = 'var(--nav-h)';
    var targetID = SCREEN_MAP[name];
    if (targetID) {
      var targetEl = document.getElementById(targetID);
      if (targetEl) targetEl.style.display = 'block';
    }
  }
  window.scrollTo(0, 0);
}

// ── GAS CALL HELPER ───────────────────────────────────────────
function gasCall(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn].apply(runner, args);
  });
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type, duration) {
  type = type || 'success';
  duration = duration || 3000;
  var svgCheck = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"><\/polyline><\/svg>';
  var svgX = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"><\/circle><line x1="15" y1="9" x2="9" y2="15"><\/line><line x1="9" y1="9" x2="15" y2="15"><\/line><\/svg>';
  var svgWarn = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="10.29 3.86 1.82 18 22.18 18 13.71 3.86 10.29 3.86"><\/polygon><line x1="12" y1="9" x2="12" y2="13"><\/line><line x1="12" y1="17" x2="12.01" y2="17"><\/line><\/svg>';
  var icons = { success: svgCheck, error: svgX, warning: svgWarn };
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = (icons[type] || '') + '<span style="margin-left:6px">' + escHtml(msg) + '<\/span>';
  document.getElementById('toast-container').appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0'; t.style.transform = 'translateX(100%)'; t.style.transition = 'all .3s';
    setTimeout(function() { t.remove(); }, 300);
  }, duration);
}

// ── LOADING ───────────────────────────────────────────────────
function setLoading(show, msg) {
  var el = document.getElementById('loading-overlay');
  if (!el) return;
  if (show) {
    el.style.display = 'flex';
    var txt = el.querySelector('.loading-text');
    if (txt) txt.textContent = msg || 'Loading...';
  } else {
    el.style.display = 'none';
  }
}

// ── UTILITY ───────────────────────────────────────────────────
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getAreaIcon(name) {
  var n = (name || '').toLowerCase();
  if (n.indexOf('consumer') >= 0 || n.indexOf('33kv') >= 0 || n.indexOf('ht') >= 0) return { emoji: '\u26A1', bg: '#fef9c3', color: '#854d0e' };
  if (n.indexOf('transform') >= 0) return { emoji: '\uD83D\uDD0C', bg: '#e0e7ff', color: '#3730a3' };
  if (n.indexOf('msb') >= 0 || n.indexOf('lv') >= 0 || n.indexOf('420') >= 0) return { emoji: '\uD83D\uDD0B', bg: '#dcfce7', color: '#166534' };
  if (n.indexOf('hygro') >= 0 || n.indexOf('humidity') >= 0 || n.indexOf('temp') >= 0) return { emoji: '\uD83D\uDCA7', bg: '#dbeafe', color: '#1e40af' };
  if (n.indexOf('solar') >= 0) return { emoji: '\u2600\uFE0F', bg: '#fef3c7', color: '#92400e' };
  if (n.indexOf('fcu') >= 0 || n.indexOf('office') >= 0) return { emoji: '\u2744\uFE0F', bg: '#e0f2fe', color: '#075985' };
  if (n.indexOf('ahu') >= 0) return { emoji: '\uD83D\uDCA8', bg: '#f3e8ff', color: '#6b21a8' };
  if (n.indexOf('chiller') >= 0) return { emoji: '\uD83C\uDF21\uFE0F', bg: '#cffafe', color: '#164e63' };
  if (n.indexOf('testing') >= 0 || n.indexOf('test') >= 0) return { emoji: '\uD83D\uDD2C', bg: '#fce7f3', color: '#9d174d' };
  if (n.indexOf('production') >= 0 || n.indexOf('line') >= 0) return { emoji: '\uD83C\uDFED', bg: '#fee2e2', color: '#991b1b' };
  return { emoji: '\u2699\uFE0F', bg: '#f3f4f6', color: '#374151' };
}

function getCycleBadgeClass(cycle) {
  var map = { 'Daily': 'badge-blue', 'Weekly': 'badge-green', 'Bi-Weekly': 'badge-green', 'Semi-Monthly': 'badge-purple', 'Monthly': 'badge-purple', 'Quarterly': 'badge-orange', 'Semi-Annual': 'badge-orange', 'Annual': 'badge-red' };
  return map[cycle] || 'badge-gray';
}

function formatDate(dateStr) {
  if (!dateStr) return 'Never';
  try {
    var d = new Date(dateStr);
    return d.toLocaleDateString('en-MY', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return dateStr; }
}

function formatDateShort(dateStr) {
  if (!dateStr) return 'Never';
  try {
    var d = new Date(dateStr);
    return d.toLocaleDateString('en-MY', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) { return dateStr; }
}

// ── LOGIN ──────────────────────────────────────────────────────
var loginState = { selectedTech: null, pin: '' };

async function initLogin() {
  setLoading(true, 'Loading technicians...');
  try {
    var techs = await gasCall('getTechnicians');
    APP.technicians = techs || [];
    renderTechList();
    showStep('step-select');
    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load technicians: ' + e.message, 'error');
  }
}

function renderTechList() {
  // PIN-first flow: no list to render. Techs are loaded into APP.technicians for PIN lookup.
}

function selectTech(techID) {
  loginState.selectedTech = null;
  for (var i = 0; i < APP.technicians.length; i++) {
    if (APP.technicians[i].techID === techID) { loginState.selectedTech = APP.technicians[i]; break; }
  }
}

// PIN-first: user types their PIN on the initial screen, we resolve who they are
function pinFirstPress(val) {
  var errEl = document.getElementById('pin-first-error');
  var hintEl = document.getElementById('pin-first-hint');
  if (errEl) errEl.style.display = 'none';

  if (val === 'DEL') {
    loginState.pin = loginState.pin.slice(0, -1);
  } else if (loginState.pin.length < 4) {
    loginState.pin += val;
  }

  // Update dots on step-select (they share same class)
  var dots = document.querySelectorAll('#step-select .pin-dot');
  dots.forEach(function(d, i) { d.classList.toggle('filled', i < loginState.pin.length); });

  if (loginState.pin.length === 4) {
    setTimeout(function() { doLoginByPin(loginState.pin); }, 200);
  }
}

async function doLoginByPin(pin) {
  setLoading(true, 'Verifying...');
  try {
    var result = await gasCall('verifyLoginByPin', pin);
    setLoading(false);
    if (result && result.success) {
      loginState.selectedTech = { techID: result.techID, name: result.name, role: result.role };
      await finishLogin(result);
    } else {
      loginState.pin = '';
      var dots = document.querySelectorAll('#step-select .pin-dot');
      dots.forEach(function(d) { d.classList.remove('filled'); });
      var errEl = document.getElementById('pin-first-error');
      if (errEl) { errEl.style.display = 'block'; }
      setTimeout(function() { if (errEl) errEl.style.display = 'none'; }, 2500);
    }
  } catch(e) {
    setLoading(false);
    loginState.pin = '';
    var errEl = document.getElementById('pin-first-error');
    if (errEl) errEl.style.display = 'block';
  }
}

function showStep(id) {
  document.querySelectorAll('.login-step').forEach(function(s) { s.classList.remove('active'); });
  var el = document.getElementById(id);
  if (el) el.classList.add('active');
  if (id === 'step-pin' || id === 'step-quick') { loginState.pin = ''; updatePinDots(); }
}

function pinPress(val) {
  if (val === 'DEL') { loginState.pin = loginState.pin.slice(0, -1); }
  else if (loginState.pin.length < 4) { loginState.pin += val; }
  updatePinDots();
  if (loginState.pin.length === 4) setTimeout(doLogin, 200);
}

function updatePinDots() {
  var dots = document.querySelectorAll('.pin-dot');
  dots.forEach(function(d, i) { d.classList.toggle('filled', i < loginState.pin.length); });
}

// Shared post-login handler called by all login paths
async function finishLogin(result) {
  APP.session = result;
  sessionSave(result);
  try { localStorage.setItem('fmp_last_user', JSON.stringify({ techID: result.techID, name: result.name, role: result.role })); } catch(e) {}
  var nameEl = document.getElementById('nav-user-name');
  var avatarEl = document.getElementById('nav-avatar-text');
  if (nameEl) nameEl.textContent = result.name;
  if (avatarEl) avatarEl.textContent = result.name.charAt(0).toUpperCase();
  showToast('Welcome, ' + result.name + '!', 'success');
  loginState.pin = '';
  if (!APP.technicians || !APP.technicians.length) {
    gasCall('getTechnicians').then(function(t) { if (t) APP.technicians = t; }).catch(function(){});
  }
  var directFeId = (typeof OPEN_FE_ID !== 'undefined') ? OPEN_FE_ID : '';
  if (directFeId) { checkFEDirectLink(); return; }
  var openAreaID  = (typeof OPEN_AREA_ID  !== 'undefined') ? OPEN_AREA_ID  : '';
  var openEquipID = (typeof OPEN_EQUIP_ID !== 'undefined') ? OPEN_EQUIP_ID : '';
  if (openAreaID) {
    var ok = await handleQRDeepLink(openAreaID, openEquipID);
    if (ok) return;
  }
  await loadMyTasksScreen();
}

// Legacy step-pin / step-quick path (selectedTech already set)
async function doLogin() {
  if (!loginState.selectedTech) return;
  setLoading(true, 'Verifying...');
  try {
    var result = await gasCall('verifyLogin', loginState.selectedTech.techID, loginState.pin);
    setLoading(false);
    if (result && result.success) {
      await finishLogin(result);
    } else {
      loginState.pin = '';
      updatePinDots();
      var activeStep = document.querySelector('.login-step.active');
      var errId = activeStep && activeStep.id === 'step-quick' ? 'quick-error' : 'login-error';
      var errEl = document.getElementById(errId);
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Incorrect PIN. Please try again.'; }
      setTimeout(function() { if (errEl) errEl.style.display = 'none'; }, 2000);
    }
  } catch(e) {
    setLoading(false);
    showToast('Login error: ' + e.message, 'error');
  }
}

function logout() {
  APP.session = null;
  sessionClear();
  loginState = { selectedTech: null, pin: '' };
  closeDropdown();
  showScreen('login');
  initLogin();
}

// ── PLANTS SCREEN ──────────────────────────────────────────────
async function loadPlantsScreen() {
  sessionTouch();
  showScreen('plants');
  var now = Date.now();
  // Use cached data if fresh (within 60s) and already rendered
  if (APP.plants.length > 0 && (now - APP.cache.plantsTs) < APP.CACHE_TTL) {
    renderPlantsScreen();
    return;
  }
  setLoading(true, 'Loading...');
  try {
    // Single call returns plants + dashboard stats + per-plant stats
    var result = await gasCall('getDashboardFull');
    if (result && result.error) throw new Error(result.error);
    APP.plants    = result.plants    || [];
    APP.dashStats = result.dashboard || {};
    APP.allPlantStats = result.plantStats || {};
    APP.cache.plantsTs = Date.now();
    renderPlantsScreen();
    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load: ' + e.message, 'error');
  }
}

function renderPlantsScreen() {
  var s = APP.dashStats;
  document.getElementById('dash-total-plants').textContent = s.totalPlants || 0;
  document.getElementById('dash-total-areas').textContent  = s.totalAreas  || 0;
  document.getElementById('dash-total-equip').textContent  = s.totalEquipment || 0;
  document.getElementById('dash-pending').textContent      = s.pendingToday  || 0;

  // My Tasks banner
  var bannerEl = document.getElementById('mytasks-banner');
  var bannerText = document.getElementById('mytasks-banner-text');
  var badgeEl = document.getElementById('sidebar-mytasks-badge');
  var pending = s.pendingToday || 0;
  if (bannerEl) {
    if (pending > 0) {
      bannerEl.style.display = 'flex';
      if (bannerText) bannerText.textContent = pending + ' inspection' + (pending === 1 ? '' : 's') + ' need attention';
    } else {
      bannerEl.style.display = 'none';
      if (bannerText) bannerText.textContent = 'All caught up!';
    }
  }
  if (badgeEl) {
    if (pending > 0) { badgeEl.style.display = 'inline-block'; badgeEl.textContent = pending; }
    else badgeEl.style.display = 'none';
  }

  // Greeting bar
  var now  = new Date();
  var hr   = now.getHours();
  var grt  = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  var name = APP.session ? APP.session.name : '';
  var dateStr = now.toLocaleDateString('en-MY', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  var timeStr = now.toLocaleTimeString('en-MY', { hour:'2-digit', minute:'2-digit', hour12:true });
  var gEl = document.getElementById('greeting-text');  if (gEl) gEl.textContent = grt + ',';
  var nEl = document.getElementById('greeting-name');  if (nEl) nEl.textContent = name;
  var dEl = document.getElementById('greeting-date');  if (dEl) dEl.textContent = dateStr;
  var tEl = document.getElementById('greeting-time');  if (tEl) tEl.textContent = timeStr;

  var container = document.getElementById('plant-cards');
  if (!container) return;
  if (!APP.plants.length) {
    container.innerHTML = '<div class="empty-state"><h3>No Plants Found<\/h3><p>Run seedData() in Apps Script editor.<\/p><\/div>';
    return;
  }

  container.innerHTML = APP.plants.map(function(p, idx) {
    var stats     = (APP.allPlantStats && APP.allPlantStats[p.plantID]) || {};
    var total     = stats.totalEquipment || 0;
    var pending   = stats.pendingToday   || 0;
    var completed = total - pending;
    var pct       = total > 0 ? Math.round((completed / total) * 100) : 0;
    var pctColor  = pct >= 80 ? '#16a34a' : pct >= 50 ? '#ea580c' : '#dc2626';
    var fillColor = pct >= 80 ? '#16a34a' : pct >= 50 ? '#f97316' : '#ef4444';
    var isP2      = idx > 0;

    return '<div class="plant-card-v2' + (isP2 ? ' p2' : '') + '">' +
      '<div class="plant-card-v2-body">' +

        '<div class="plant-v2-header">' +
          '<div style="display:flex;align-items:center;gap:12px">' +
            '<div class="plant-v2-badge">' +
              '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"><\/rect><polyline points="17 2 12 7 7 2"><\/polyline><\/svg>' +
            '<\/div>' +
            '<div>' +
              '<div class="plant-v2-name">' + escHtml(p.plantName) + '<\/div>' +
              '<div class="plant-v2-loc">' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"><\/path><circle cx="12" cy="10" r="3"><\/circle><\/svg>' +
                escHtml(p.location || 'Factory') +
              '<\/div>' +
            '<\/div>' +
          '<\/div>' +
          '<div style="font-size:22px;font-weight:800;color:' + pctColor + '">' + pct + '%<\/div>' +
        '<\/div>' +

        '<div class="plant-v2-stats" id="plant-stats-' + p.plantID + '">' +
          '<div class="plant-v2-stat"><div class="plant-v2-stat-val">' + (stats.totalAreas||'–') + '<\/div><div class="plant-v2-stat-lbl">Areas<\/div><\/div>' +
          '<div class="plant-v2-stat"><div class="plant-v2-stat-val">' + (total||'–') + '<\/div><div class="plant-v2-stat-lbl">Equipment<\/div><\/div>' +
          '<div class="plant-v2-stat"><div class="plant-v2-stat-val" style="color:#16a34a">' + completed + '<\/div><div class="plant-v2-stat-lbl">Done Today<\/div><\/div>' +
          '<div class="plant-v2-stat"><div class="plant-v2-stat-val" style="color:#dc2626">' + pending + '<\/div><div class="plant-v2-stat-lbl">Pending<\/div><\/div>' +
        '<\/div>' +

        '<div class="plant-v2-progress-wrap">' +
          '<div class="plant-v2-progress-header">' +
            '<span class="plant-v2-progress-label">Today Completion<\/span>' +
            '<span class="plant-v2-progress-pct" style="color:' + pctColor + '">' + completed + ' / ' + total + '<\/span>' +
          '<\/div>' +
          '<div class="plant-v2-progress-bar"><div class="plant-v2-progress-fill" style="width:' + pct + '%;background:' + fillColor + '"><\/div><\/div>' +
        '<\/div>' +

        '<div class="plant-v2-actions">' +
          '<button class="plant-v2-btn plant-v2-btn-checklist" onclick="openPlant(' + "'" + p.plantID + "'" + ')">' +
            '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"><\/path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"><\/path><\/svg> Checklist' +
          '<\/button>' +
          '<button class="plant-v2-btn plant-v2-btn-areas" onclick="openPlantAreas(' + "'" + p.plantID + "'" + ')">' +
            '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"><\/line><line x1="8" y1="12" x2="21" y2="12"><\/line><line x1="8" y1="18" x2="21" y2="18"><\/line><\/svg> By Area' +
          '<\/button>' +
        '<\/div>' +
      '<\/div>' +
    '<\/div>';
  }).join('');
}

async function loadPlantCardStats(plantID) {
  try {
    var stats = await gasCall('getPlantStats', plantID);
    var el = document.getElementById('plant-stats-' + plantID);
    if (el && stats) {
      var nums = el.querySelectorAll('.stat-num');
      if (nums[0]) nums[0].textContent = stats.totalAreas || 0;
      if (nums[1]) nums[1].textContent = stats.totalEquipment || 0;
      if (nums[2]) nums[2].textContent = stats.pendingToday || 0;
    }
  } catch(e) {}
}

async function openPlant(plantID) {
  for (var i = 0; i < APP.plants.length; i++) {
    if (APP.plants[i].plantID === plantID) { APP.currentPlant = APP.plants[i]; break; }
  }
  await loadChecklistScreen(plantID);
}

async function openPlantAreas(plantID) {
  for (var i = 0; i < APP.plants.length; i++) {
    if (APP.plants[i].plantID === plantID) { APP.currentPlant = APP.plants[i]; break; }
  }
  APP.areaPage = 1;
  await loadAreasScreen();
}

// ── AREAS SCREEN ───────────────────────────────────────────────
async function loadAreasScreen() {
  showScreen('areas');
  var now = Date.now();
  var plantID = APP.currentPlant ? APP.currentPlant.plantID : '';
  // Use cached data if fresh and same plant
  if (APP.areas.length > 0 && APP.cache.areasTs[plantID] && (now - APP.cache.areasTs[plantID]) < APP.CACHE_TTL) {
    renderAreasScreen();
    return;
  }
  setLoading(true, 'Loading areas...');
  try {
    // Single call: areas + stats computed server-side in one sheet read
    var areasWithStats = await gasCall('getAreasWithStats', APP.currentPlant.plantID);
    if (areasWithStats && areasWithStats.error) throw new Error(areasWithStats.error);
    areasWithStats = areasWithStats || [];
    APP.areas = areasWithStats;
    APP.areaStats = {};
    areasWithStats.forEach(function(a) { APP.areaStats[a.areaID] = a; });
    APP.cache.areasTs[plantID] = Date.now();
    renderAreasScreen();
    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load areas: ' + e.message, 'error');
  }
}

function renderAreasScreen() {
  var p = APP.currentPlant;
  var nameEl = document.getElementById('areas-plant-name');
  var bcEl = document.getElementById('breadcrumb-plant');
  if (nameEl) nameEl.textContent = p.plantName;
  if (bcEl) bcEl.textContent = p.plantName;

  var totalEquip = 0, totalCompleted = 0;
  Object.values(APP.areaStats).forEach(function(a) {
    totalEquip += (a.totalEquipment || 0);
    totalCompleted += (a.completedToday || 0);
  });
  var totalPending = totalEquip - totalCompleted;
  var completedPct = totalEquip > 0 ? Math.round((totalCompleted / totalEquip) * 100) : 0;
  var pendingPct = 100 - completedPct;

  document.getElementById('areas-total-areas').textContent = APP.areas.length;
  document.getElementById('areas-total-equip').textContent = totalEquip;
  document.getElementById('areas-completed').textContent = totalCompleted + ' (' + completedPct + '%)';
  document.getElementById('areas-pending').textContent = totalPending + ' (' + pendingPct + '%)';

  renderAreaCards();
}

function renderAreaCards() {
  var start = (APP.areaPage - 1) * APP.areaPageSize;
  var paged = APP.areas.slice(start, start + APP.areaPageSize);
  var container = document.getElementById('area-cards');
  if (!container) return;

  container.innerHTML = paged.map(function(area) {
    var stats = APP.areaStats[area.areaID] || {};
    var pct = stats.progressPct || 0;
    var icon = getAreaIcon(area.areaName);
    var barClass = pct >= 70 ? 'green' : pct >= 30 ? 'orange' : 'red';
    var statusBadge, statusClass;
    if (pct === 100) { statusBadge = '\u2713 On Track'; statusClass = 'badge-green'; }
    else if (pct > 0) { statusBadge = '\u23F3 Pending'; statusClass = 'badge-orange'; }
    else { statusBadge = '\u2014 Not Due'; statusClass = 'badge-gray'; }

    return '<div class="area-card">' +
      '<div class="area-card-header">' +
        '<div class="area-card-icon" style="background:' + icon.bg + ';font-size:22px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;">' + icon.emoji + '<\/div>' +
        '<div class="area-card-title">' +
          '<div class="area-name">' + escHtml(area.areaName) + '<\/div>' +
          '<div class="area-badges"><span class="badge badge-blue">Daily<\/span><span class="badge ' + statusClass + '">' + statusBadge + '<\/span><\/div>' +
        '<\/div>' +
      '<\/div>' +
      '<div class="progress-bar-wrap"><div class="progress-bar-fill ' + barClass + '" style="width:' + pct + '%"><\/div><\/div>' +
      '<div class="progress-pct">' + pct + '%<\/div>' +
      '<div class="area-equip-stats">' +
        '<div class="area-equip-stat"><div class="label">Equipment<\/div><div class="value">' + (stats.totalEquipment || 0) + '<\/div><\/div>' +
        '<div class="area-equip-stat"><div class="label">Completed<\/div><div class="value">' + (stats.completedToday || 0) + '<\/div><\/div>' +
        '<div class="area-equip-stat"><div class="label">Pending<\/div><div class="value red">' + (stats.pendingToday || 0) + '<\/div><\/div>' +
      '<\/div>' +
      '<div class="area-actions">' +
        '<button class="btn btn-primary btn-sm" style="flex:1" onclick="openArea(\'' + area.areaID + '\')">\u25B6 Start Inspection<\/button>' +
        '<button class="btn btn-outline btn-sm" style="flex:1" onclick="openReport(\'' + area.areaID + '\')">&#128202; View Report<\/button>' +
      '<\/div>' +
    '<\/div>';
  }).join('');

  renderAreaPagination();
}

function renderAreaPagination() {
  var total = APP.areas.length;
  var pages = Math.ceil(total / APP.areaPageSize);
  var start = (APP.areaPage - 1) * APP.areaPageSize + 1;
  var end = Math.min(APP.areaPage * APP.areaPageSize, total);
  var infoEl = document.getElementById('area-page-info');
  if (infoEl) infoEl.textContent = 'Showing ' + start + ' to ' + end + ' of ' + total + ' areas';

  var btns = document.getElementById('area-page-btns');
  if (!btns) return;
  var html = '<button class="pg-btn" onclick="areaChangePage(' + (APP.areaPage-1) + ')" ' + (APP.areaPage===1?'disabled':'') + '>\u2039 Previous<\/button>';
  for (var i = 1; i <= pages; i++) html += '<button class="pg-btn pg-num ' + (i===APP.areaPage?'active':'') + '" onclick="areaChangePage(' + i + ')">' + i + '<\/button>';
  html += '<button class="pg-btn" onclick="areaChangePage(' + (APP.areaPage+1) + ')" ' + (APP.areaPage===pages?'disabled':'') + '>Next \u203A<\/button>';
  btns.innerHTML = html;
}

function areaChangePage(p) {
  var pages = Math.ceil(APP.areas.length / APP.areaPageSize);
  if (p < 1 || p > pages) return;
  APP.areaPage = p;
  renderAreaCards();
  window.scrollTo(0, 0);
}

async function openArea(areaID) {
  for (var i = 0; i < APP.areas.length; i++) {
    if (APP.areas[i].areaID === areaID) { APP.currentArea = APP.areas[i]; break; }
  }
  APP.equipPage = 1;
  APP.equipSearch = '';
  APP.equipStatusFilter = '';
  APP.equipCycleFilter = '';
  await loadEquipmentScreen();
}

// ── EQUIPMENT SCREEN ───────────────────────────────────────────
async function loadEquipmentScreen() {
  sessionTouch();
  if (APP.cameFromMyTasks) {
    APP.cameFromMyTasks = false;
    return loadMyTasksScreen();
  }
  showScreen('equipment');
  // Use cache if same area+date and within TTL
  var cacheKey = APP.currentArea.areaID + '_' + APP.selectedDate;
  var cached = APP.cache.areasTs[cacheKey];
  if (cached && (Date.now() - cached) < APP.CACHE_TTL && APP.equipWithStatus.length) {
    renderEquipmentScreen();
    return;
  }
  setLoading(true, 'Loading equipment...');
  try {
    var equipWithStatus = await gasCall('getEquipmentWithStatus', APP.currentArea.areaID, APP.selectedDate);
    APP.equipWithStatus = equipWithStatus || [];
    APP.cache.areasTs[cacheKey] = Date.now();
    renderEquipmentScreen();
    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load equipment: ' + e.message, 'error');
  }
}

function renderEquipmentScreen() {
  var bcPlant = document.getElementById('equip-breadcrumb-plant');
  var bcArea = document.getElementById('equip-breadcrumb-area');
  var dateDisp = document.getElementById('equip-date-display');
  if (bcPlant) bcPlant.textContent = APP.currentPlant.plantName;
  if (bcArea) bcArea.textContent = APP.currentArea.areaName;
  if (dateDisp) dateDisp.textContent = 'Today, ' + formatDateShort(APP.selectedDate);

  var all = APP.equipWithStatus;
  var completed = all.filter(function(e) { return e.equipStatus === 'Completed Today'; }).length;
  var pending = all.filter(function(e) { return e.equipStatus === 'Pending'; }).length;
  var overdue = all.filter(function(e) { return e.equipStatus === 'Overdue'; }).length;
  var pctC = all.length > 0 ? Math.round((completed / all.length) * 100) : 0;
  var pctP = all.length > 0 ? Math.round((pending / all.length) * 100) : 0;
  var pctO = all.length > 0 ? Math.round((overdue / all.length) * 100) : 0;

  document.getElementById('es-total').textContent = all.length;
  document.getElementById('es-completed').textContent = completed + ' (' + pctC + '%)';
  document.getElementById('es-pending').textContent = pending + ' (' + pctP + '%)';
  document.getElementById('es-overdue').textContent = overdue + ' (' + pctO + '%)';
  document.getElementById('es-tomorrow').textContent = pending;

  renderEquipCards();
  eqrlOnEquipLoaded();
}

function getFilteredEquip() {
  return APP.equipWithStatus.filter(function(eq) {
    var search = APP.equipSearch.toLowerCase();
    var matchSearch = !search || eq.equipmentName.toLowerCase().indexOf(search) >= 0 || (eq.assetTag || '').toLowerCase().indexOf(search) >= 0;
    var matchStatus = !APP.equipStatusFilter || eq.equipStatus === APP.equipStatusFilter;
    var matchCycle = !APP.equipCycleFilter || eq.inspectionCycle === APP.equipCycleFilter;
    return matchSearch && matchStatus && matchCycle;
  });
}

function renderEquipCards() {
  var filtered = getFilteredEquip();
  var start = (APP.equipPage - 1) * APP.equipPageSize;
  var paged = filtered.slice(start, start + APP.equipPageSize);
  var container = document.getElementById('equip-cards');
  if (!container) return;
  var isGrid = APP.equipViewMode === 'grid';
  container.className = isGrid ? 'equip-grid' : 'equip-list';

  if (!paged.length) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1\/-1"><h3>No Equipment Found<\/h3><p>Try adjusting your filters.<\/p><\/div>';
  } else {
    container.innerHTML = paged.map(function(eq) { return renderEquipCard(eq, isGrid); }).join('');
  }
  renderEquipPagination(filtered.length);
}

function renderEquipCard(eq, isGrid) {
  var statusMap = {
    'Completed Today': { cls: 'completed', badgeCls: 'badge-green', label: 'Completed Today' },
    'Pending':         { cls: 'pending',   badgeCls: 'badge-orange', label: 'Pending' },
    'Overdue':         { cls: 'overdue',   badgeCls: 'badge-red',    label: 'Overdue' }
  };
  var st = statusMap[eq.equipStatus] || statusMap['Pending'];
  var dateDisplay = eq.lastInspection ? formatDate(eq.lastInspection) : 'Never inspected';
  var isOverdueDate = eq.equipStatus === 'Overdue';

  var iconSvg;
  if (st.cls === 'completed') {
    iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"><\/polyline><\/svg>';
  } else if (st.cls === 'pending') {
    iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"><\/circle><polyline points="12 6 12 12 16 14"><\/polyline><\/svg>';
  } else {
    iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"><\/circle><line x1="12" y1="8" x2="12" y2="12"><\/line><line x1="12" y1="16" x2="12.01" y2="16"><\/line><\/svg>';
  }

  return '<div class="equip-card' + (isGrid ? '' : ' list-view') + '">' +
    '<div class="equip-status-icon ' + st.cls + '">' + iconSvg + '<\/div>' +
    '<div class="equip-card-info">' +
      '<div class="equip-name-row">' +
        '<span class="equip-name">' + escHtml(eq.equipmentName) + '<\/span>' +
        '<span class="badge ' + getCycleBadgeClass(eq.inspectionCycle) + '">' + escHtml(eq.inspectionCycle) + '<\/span>' +
      '<\/div>' +
      '<div class="equip-meta">Asset Tag: ' + escHtml(eq.assetTag || '\u2013') + ' | Location: ' + escHtml(APP.currentArea.areaName) + '<\/div>' +
      '<div class="equip-last-insp">' +
        '<div><div class="equip-last-label">Last Inspection<\/div><div class="equip-last-date' + (isOverdueDate ? ' overdue' : '') + '">\uD83D\uDCC5 ' + escHtml(dateDisplay) + '<\/div><\/div>' +
        '<span class="badge ' + st.badgeCls + '">' + st.label + '<\/span>' +
      '<\/div>' +
      '<button class="btn-inspect" onclick="openInspectionForm(\'' + eq.equipID + '\')">Inspect \u2192<\/button>' +
    '<\/div>' +
  '<\/div>';
}

function renderEquipPagination(total) {
  var pages = Math.ceil(total / APP.equipPageSize);
  var start = Math.min((APP.equipPage - 1) * APP.equipPageSize + 1, total || 1);
  var end = Math.min(APP.equipPage * APP.equipPageSize, total);
  var infoEl = document.getElementById('equip-page-info');
  if (infoEl) infoEl.textContent = 'Showing ' + start + ' to ' + end + ' of ' + total + ' equipment';

  var btns = document.getElementById('equip-page-btns');
  if (!btns) return;
  var html = '<button class="pg-btn" onclick="equipChangePage(' + (APP.equipPage-1) + ')" ' + (APP.equipPage===1?'disabled':'') + '>\u2039 Previous<\/button>';
  var maxP = Math.min(pages, 5);
  for (var i = 1; i <= maxP; i++) html += '<button class="pg-btn pg-num ' + (i===APP.equipPage?'active':'') + '" onclick="equipChangePage(' + i + ')">' + i + '<\/button>';
  html += '<button class="pg-btn" onclick="equipChangePage(' + (APP.equipPage+1) + ')" ' + (APP.equipPage>=pages||pages===0?'disabled':'') + '>Next \u203A<\/button>';
  btns.innerHTML = html;
}

function equipChangePage(p) {
  var pages = Math.ceil(getFilteredEquip().length / APP.equipPageSize);
  if (p < 1 || p > pages) return;
  APP.equipPage = p;
  renderEquipCards();
}

function filterEquip() {
  var s = document.getElementById('equip-search');
  var sf = document.getElementById('equip-status-filter');
  var cf = document.getElementById('equip-cycle-filter');
  APP.equipSearch = s ? s.value : '';
  APP.equipStatusFilter = sf ? sf.value : '';
  APP.equipCycleFilter = cf ? cf.value : '';
  APP.equipPage = 1;
  renderEquipCards();
}

function setViewMode(mode) {
  APP.equipViewMode = mode;
  document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('view-btn-' + mode);
  if (btn) btn.classList.add('active');
  renderEquipCards();
}

// ── INSPECTION FORM ────────────────────────────────────────────
async function openInspectionForm(equipID) {
  for (var i = 0; i < APP.equipWithStatus.length; i++) {
    if (APP.equipWithStatus[i].equipID === equipID) { APP.currentEquip = APP.equipWithStatus[i]; break; }
  }
  APP.currentInspection = { details: {} };
  clearPhotoPreview();
  showScreen('form');
  setLoading(true, 'Loading inspection form...');
  try {
    // Only fetch technicians if not already cached
    var calls = [gasCall('getTemplates', equipID)];
    if (!APP.technicians || !APP.technicians.length) calls.push(gasCall('getTechnicians'));
    var results = await Promise.all(calls);
    APP.templates = results[0] || [];
    if (results[1]) APP.technicians = results[1];
    renderInspectionForm();
    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load form: ' + e.message, 'error');
  }
}

function renderInspectionForm() {
  var eq = APP.currentEquip;
  if (!eq) return;

  var nameEl = document.getElementById('form-equip-name');
  var assetEl = document.getElementById('form-asset-tag');
  var locEl = document.getElementById('form-location');
  var dateEl = document.getElementById('form-insp-date');
  var bcPlant = document.getElementById('form-breadcrumb-plant');
  var bcArea = document.getElementById('form-breadcrumb-area');
  var bcEquip = document.getElementById('form-breadcrumb-equip');

  if (nameEl) nameEl.textContent = eq.equipmentName;
  if (assetEl) assetEl.textContent = 'Asset Tag: ' + (eq.assetTag || '\u2013');
  if (locEl) locEl.textContent = 'Location: ' + (APP.currentArea ? APP.currentArea.areaName : '\u2013');
  if (dateEl) dateEl.value = APP.selectedDate;
  if (bcPlant) bcPlant.textContent = APP.currentPlant.plantName;
  if (bcArea) bcArea.textContent = APP.currentArea.areaName;
  if (bcEquip) bcEquip.textContent = eq.equipmentName;

  var dotEl = document.getElementById('form-status-dot');
  if (dotEl) {
    if (eq.equipStatus === 'Completed Today') dotEl.className = 'status-dot green';
    else if (eq.equipStatus === 'Overdue') dotEl.className = 'status-dot red';
    else dotEl.className = 'status-dot orange';
  }

  var techSel = document.getElementById('form-tech-select');
  if (techSel) {
    techSel.innerHTML = APP.technicians.map(function(t) {
      return '<option value="' + t.techID + '"' + (t.techID === APP.session.techID ? ' selected' : '') + '>' + escHtml(t.name) + '<\/option>';
    }).join('');
  }

  var paramContainer = document.getElementById('param-container');
  if (!paramContainer) return;

  if (!APP.templates || APP.templates.length === 0) {
    paramContainer.innerHTML = '<div class="no-params-msg">No parameters defined for this equipment. Add parameters via the Admin panel, then save a general note below.<\/div>';
  } else {
    var paramCards = APP.templates.map(function(t) { return renderParamCard(t); }).join('');
    paramContainer.innerHTML =
      '<div class="param-section">' +
        '<div class="param-section-title">Inspection Parameters<\/div>' +
        '<div class="param-section-sub">Enter all readings and verify within the acceptable range<\/div>' +
        '<div class="param-grid">' + paramCards + '<\/div>' +
      '<\/div>';
  }
}

function renderParamCard(tmpl) {
  var rangeText = tmpl.type === 'numeric' ? 'Range: ' + tmpl.minValue + ' \u2013 ' + tmpl.maxValue : '';
  var unitText = tmpl.unit || '';

  if (tmpl.type === 'yesno') {
    return '<div class="param-card" id="pc-' + tmpl.templateID + '">' +
      '<div class="param-name">' + escHtml(tmpl.parameterName) + '<\/div>' +
      '<div class="param-range">' + (tmpl.required ? '* Required' : 'Optional') + '<\/div>' +
      '<div class="param-yesno">' +
        '<button class="yesno-btn yes" onclick="setYesNo(\'' + tmpl.templateID + '\',\'Yes\')">Yes<\/button>' +
        '<button class="yesno-btn no" onclick="setYesNo(\'' + tmpl.templateID + '\',\'No\')">No<\/button>' +
      '<\/div>' +
      '<div class="param-status" id="ps-' + tmpl.templateID + '"><\/div>' +
    '<\/div>';
  }

  if (tmpl.type === 'text') {
    return '<div class="param-card" id="pc-' + tmpl.templateID + '">' +
      '<div class="param-name">' + escHtml(tmpl.parameterName) + '<\/div>' +
      '<div class="param-range">' + (tmpl.required ? '* Required' : 'Optional') + '<\/div>' +
      '<input type="text" class="param-input" id="pi-' + tmpl.templateID + '" placeholder="Enter value" oninput="setTextParam(\'' + tmpl.templateID + '\')">' +
      '<div class="param-status" id="ps-' + tmpl.templateID + '"><\/div>' +
    '<\/div>';
  }

if (tmpl.type === 'multichoice') {

  var opts = (tmpl.options || tmpl.Options || '')
    .split(',')
    .map(function(o){ return o.trim(); })
    .filter(Boolean);

  var btns = opts.map(function(opt){

    return '<button type="button" ' +
      'class="choice-btn" ' +
      'onclick="setMultiChoice(\'' +
      tmpl.templateID +
      '\',\'' +
      opt +
      '\',this)">' +
      escHtml(opt) +
      '</button>';

  }).join('');

  return '<div class="param-card" id="pc-' + tmpl.templateID + '">' +

    '<div class="param-name">' +
    escHtml(tmpl.parameterName) +
    '</div>' +

    '<div class="param-range">' +
    (tmpl.required ? '* Required' : 'Optional') +
    '</div>' +

    '<div class="choice-group">' +
    btns +
    '</div>' +

    '<div class="param-status" id="ps-' + tmpl.templateID + '"></div>' +

  '</div>';
}

  // numeric — pass min/max as quoted strings to avoid blank/undefined args
  var minArg = (tmpl.minValue !== '' && tmpl.minValue !== null && tmpl.minValue !== undefined) ? tmpl.minValue : "''";
  var maxArg = (tmpl.maxValue !== '' && tmpl.maxValue !== null && tmpl.maxValue !== undefined) ? tmpl.maxValue : "''";
  return '<div class="param-card" id="pc-' + tmpl.templateID + '">' +
    '<div class="param-name">' + escHtml(tmpl.parameterName) + '<\/div>' +
    '<div class="param-range" style="display:flex;justify-content:space-between"><span>' + rangeText + '<\/span><span style="color:var(--gray-400)">' + escHtml(unitText) + '<\/span><\/div>' +
    '<input type="number" class="param-input" id="pi-' + tmpl.templateID + '" placeholder="Enter value" step="any"' +
      ' onchange="evalParam(\'' + tmpl.templateID + '\',' + minArg + ',' + maxArg + ')"' +
      ' oninput="evalParam(\'' + tmpl.templateID + '\',' + minArg + ',' + maxArg + ')">' +
    '<div class="param-status" id="ps-' + tmpl.templateID + '"><\/div>' +
  '<\/div>';
}

function evalParam(tID, min, max) {
  var input = document.getElementById('pi-' + tID);
  var card = document.getElementById('pc-' + tID);
  var statusEl = document.getElementById('ps-' + tID);
  if (!input || !card || !statusEl) return;
  var val = parseFloat(input.value);

  if (isNaN(val) || input.value === '') {
    card.className = 'param-card';
    statusEl.innerHTML = '';
    APP.currentInspection.details[tID] = null;
    return;
  }

  var tmpl = null;
  for (var i = 0; i < APP.templates.length; i++) {
    if (APP.templates[i].templateID === tID) { tmpl = APP.templates[i]; break; }
  }

  var status, label, dotCls;
  var minNum = parseFloat(min);
  var maxNum = parseFloat(max);
  var hasRange = !isNaN(minNum) && !isNaN(maxNum) && min !== '' && max !== '';

  if (!hasRange) {
    // No range defined — record only, always Normal
    status = 'Normal'; label = '\u2713 Recorded'; dotCls = 'normal';
  } else if (val >= minNum && val <= maxNum) {
    status = 'Normal';     label = '\u2713 Normal';       dotCls = 'normal';
  } else {
    status = 'OutOfRange'; label = '\u2715 Out of Range'; dotCls = 'outofrange';
  }

  card.className = 'param-card ' + dotCls;
  statusEl.className = 'param-status ' + dotCls;
  statusEl.textContent = label;

  APP.currentInspection.details[tID] = { parameterName: tmpl ? tmpl.parameterName : tID, value: val, status: status };
}

function setYesNo(tID, val) {
  document.querySelectorAll('#pc-' + tID + ' .yesno-btn').forEach(function(b) { b.classList.remove('selected'); });
  var btn = document.querySelector('#pc-' + tID + ' .yesno-btn.' + val.toLowerCase());
  if (btn) btn.classList.add('selected');
  var tmpl = null;
  for (var i = 0; i < APP.templates.length; i++) {
    if (APP.templates[i].templateID === tID) { tmpl = APP.templates[i]; break; }
  }
  APP.currentInspection.details[tID] = { parameterName: tmpl ? tmpl.parameterName : tID, value: val, status: 'Normal' };
  var card = document.getElementById('pc-' + tID);
  var statusEl = document.getElementById('ps-' + tID);
  if (card) card.className = 'param-card normal';
  if (statusEl) { statusEl.className = 'param-status normal'; statusEl.textContent = '\u2713 Recorded'; }
}

function setTextParam(tID) {
  var input = document.getElementById('pi-' + tID);
  if (!input) return;
  var tmpl = null;
  for (var i = 0; i < APP.templates.length; i++) {
    if (APP.templates[i].templateID === tID) { tmpl = APP.templates[i]; break; }
  }
  var card = document.getElementById('pc-' + tID);
  var statusEl = document.getElementById('ps-' + tID);
  if (input.value.trim()) {
    APP.currentInspection.details[tID] = { parameterName: tmpl ? tmpl.parameterName : tID, value: input.value.trim(), status: 'Normal' };
    if (card) card.className = 'param-card normal';
    if (statusEl) { statusEl.className = 'param-status normal'; statusEl.textContent = '\u2713 Recorded'; }
  } else {
    APP.currentInspection.details[tID] = null;
    if (card) card.className = 'param-card';
    if (statusEl) statusEl.textContent = '';
  }
}

function setMultiChoice(tID, value, btn) {

  document
    .querySelectorAll('#pc-' + tID + ' .choice-btn')
    .forEach(function(b){
      b.classList.remove('selected');
    });

  btn.classList.add('selected');

  var tmpl = null;

  for (var i = 0; i < APP.templates.length; i++) {
    if (APP.templates[i].templateID === tID) {
      tmpl = APP.templates[i];
      break;
    }
  }

  var status = 'Normal';

  var options = (tmpl.options || '')
    .split(',')
    .map(function(x){ return x.trim(); });

  var rules = (tmpl.statusRule || '')
    .split(',')
    .map(function(x){ return x.trim(); });

  var idx = options.indexOf(value);

  if (idx >= 0 && rules[idx]) {
    status = rules[idx];
  }

  APP.currentInspection.details[tID] = {
    parameterName: tmpl ? tmpl.parameterName : tID,
    value: value,
    status: status
  };

  var card = document.getElementById('pc-' + tID);
  var statusEl = document.getElementById('ps-' + tID);

  var cssClass = 'normal';
  var label = '✓ Normal';

  if (status === 'Attention') {
    cssClass = 'caution';
    label = '⚠ Attention';
  }

  if (
    status === 'OutOfSpec' ||
    status === 'OutOfRange'
  ) {
    cssClass = 'outofrange';
    label = '✕ Out Of Spec';
  }

  if (card) {
    card.className = 'param-card ' + cssClass;
  }

  if (statusEl) {
    statusEl.className = 'param-status ' + cssClass;
    statusEl.textContent = label;
  }
}

function clearAllParams() {

    }

}

async function saveInspection(status) {
  var eq = APP.currentEquip;
  var techSel = document.getElementById('form-tech-select');
  var dateEl = document.getElementById('form-insp-date');
  var notesEl = document.getElementById('inspection-notes');
  var techID = techSel ? techSel.value : '';
  var inspDate = dateEl ? dateEl.value : APP.selectedDate;
  var notes = notesEl ? notesEl.value : '';

  var details = Object.values(APP.currentInspection.details).filter(Boolean);

  if (status === 'Completed' && APP.templates.length > 0) {
    // Before checking, trigger evalParam for any filled inputs not yet registered
    APP.templates.forEach(function(t) {
      if (t.type === 'numeric' && !APP.currentInspection.details[t.templateID]) {
        var input = document.getElementById('pi-' + t.templateID);
        if (input && input.value !== '') {
          var mn = (t.minValue !== '' && t.minValue !== null && t.minValue !== undefined) ? t.minValue : '';
          var mx = (t.maxValue !== '' && t.maxValue !== null && t.maxValue !== undefined) ? t.maxValue : '';
          evalParam(t.templateID, mn, mx);
        }
      }
      if (t.type === 'text' && !APP.currentInspection.details[t.templateID]) {
  var tinput = document.getElementById('pi-' + t.templateID);
  if (tinput && tinput.value.trim() !== '') setTextParam(t.templateID);
}


    });

    var required = APP.templates.filter(function(t) { return t.required; });
    var missing = required.filter(function(t) { return !APP.currentInspection.details[t.templateID]; });
    if (missing.length > 0) {
      showToast('Please fill in: ' + missing.map(function(t) { return t.parameterName; }).join(', '), 'warning');
      return;
    }
  }

  setLoading(true, status === 'Draft' ? 'Saving draft...' : 'Saving inspection...');
  try {
    var result = await gasCall('saveInspection', {
      inspectionID: APP.currentInspection.inspectionID || null,
      equipID: eq.equipID,
      technicianID: techID,
      inspectionDate: inspDate,
      status: status,
      notes: notes,
      details: details
    });
    setLoading(false);
    if (result.success) {
      APP.currentInspection.inspectionID = result.inspectionID;
      // Invalidate caches so next load gets fresh data
      APP.cache.plantsTs = 0;
      APP.cache.areasTs  = {};
      APP.cache.checklistTs = {};
      // Upload photos if any — keep loading spinner visible
      if (APP.pendingPhotos && APP.pendingPhotos.length && result.inspectionID) {
        setLoading(true, 'Uploading ' + APP.pendingPhotos.length + ' photo(s)...');
        try {
          var photoPayload = APP.pendingPhotos.map(function(p) {
            return { name: p.name, base64: p.base64, mimeType: p.mimeType };
          });
          await gasCall('savePhotos', result.inspectionID, eq.equipID, photoPayload);
          clearPhotoPreview();
        } catch(pe) {
          setLoading(false);
          showToast('Inspection saved but photo upload failed: ' + pe.message, 'warning');
        }
        setLoading(false);
      }
      showToast(status === 'Draft' ? 'Draft saved.' : 'Inspection saved!', 'success');
      if (status === 'Completed') {
        setTimeout(async function() {
          if (APP.cameFromMyTasks) {
            APP.cameFromMyTasks = false;
            await loadMyTasksScreen();
          } else if (APP.checklist && APP.checklist.length > 0) {
            await loadChecklistScreen(APP.currentPlant ? APP.currentPlant.plantID : null);
          } else {
            await loadEquipmentScreen();
          }
        }, 800);
      }
    } else {
      showToast('Save failed: ' + (result.error || 'Unknown error'), 'error');
    }
  } catch(e) {
    setLoading(false);
    showToast('Save error: ' + e.message, 'error');
  }
}

function renderCycleSlicer() {
  var slicer = document.getElementById('cl-slicer');
  if (!slicer) return;

  var CYCLE_ORDER = ['Daily','Weekly','Bi-Weekly','Semi-Monthly','Monthly','Quarterly','Semi-Annual','Annual'];

  // Count pending per cycle (pending = not Completed Today)
  var cycleCounts = {}; // cycle -> { pending, total, completed }
  APP.checklist.forEach(function(eq) {
    var c = eq.inspectionCycle || 'Daily';
    if (!cycleCounts[c]) cycleCounts[c] = { pending: 0, total: 0, completed: 0 };
    cycleCounts[c].total++;
    if (eq.equipStatus === 'Completed Today') cycleCounts[c].completed++;
    else cycleCounts[c].pending++;
  });

  // Build cycles list — only cycles that exist in data, sorted
  var cycles = Object.keys(cycleCounts).sort(function(a, b) {
    var ai = CYCLE_ORDER.indexOf(a); var bi = CYCLE_ORDER.indexOf(b);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });

  // Total pending across all cycles
  var totalPending   = APP.checklist.filter(function(e){ return e.equipStatus !== 'Completed Today'; }).length;
  var totalCompleted = APP.checklist.filter(function(e){ return e.equipStatus === 'Completed Today'; }).length;
  var allDone        = totalPending === 0;

  var html = '';

  // "All" button
  var allActive = APP.clCycleFilter === 'All' ? ' active' + (allDone ? ' done' : '') : (allDone ? ' done' : '');
  html += '<button class="slicer-btn' + allActive + '" onclick="setCycleFilter(' + "'" + 'All' + "'" + ')">' +
    'All' +
    '<span class="slicer-count">' + (allDone ? '✓' : totalPending) + '<\/span>' +
  '<\/button>';

  // Per-cycle buttons
  cycles.forEach(function(c) {
    var cc = cycleCounts[c];
    var isDone    = cc.pending === 0;
    var isActive  = APP.clCycleFilter === c;
    var cls = 'slicer-btn';
    if (isActive) cls += ' active';
    if (isDone)   cls += ' done';
    if (cc.total === 0) cls += ' zero';

    html += '<button class="' + cls + '" onclick="setCycleFilter(' + "'" + c + "'" + ')">' +
      c +
      '<span class="slicer-count">' + (isDone ? '✓ ' + cc.total : cc.pending + '\/' + cc.total) + '<\/span>' +
    '<\/button>';
  });

  slicer.innerHTML = html;
}

function setCycleFilter(cycle) {
  APP.clCycleFilter = cycle;
  // Reset search when changing slicer
  APP.clSearch = '';
  var searchEl = document.getElementById('cl-search-input');
  if (searchEl) searchEl.value = '';
  renderCycleSlicer();
  renderChecklistBody();
}

function renderChecklistBody() {
  var body = document.getElementById('cl-body');
  if (!body) return;

  var search = APP.clSearch.toLowerCase().trim();
  var items = APP.checklist.filter(function(e) {
    if (!search) return true;
    return e.equipmentName.toLowerCase().indexOf(search) >= 0 ||
           (e.assetTag || '').toLowerCase().indexOf(search) >= 0 ||
           (e.areaName || '').toLowerCase().indexOf(search) >= 0 ||
           (e.category || '').toLowerCase().indexOf(search) >= 0;
  });

  if (items.length === 0) {
    body.innerHTML = '<div class="cl-empty"><h3>No equipment found<\/h3><p>Try a different search term.<\/p><\/div>';
    return;
  }

  // Flat list when searching
  if (APP.clGroupBy === 'search' && search) {
    body.innerHTML = '<div class="cl-group"><div class="cl-group-items">' +
      items.map(function(e) { return renderClItem(e); }).join('') +
    '<\/div><\/div>';
    return;
  }

  // Group key function
  function getGroupKey(e) {
    if (APP.clGroupBy === 'cycle')    return e.inspectionCycle || 'Unknown';
    if (APP.clGroupBy === 'area')     return e.areaName || 'Unknown';
    if (APP.clGroupBy === 'category') return e.category || 'General';
    return 'All';
  }

  var cycleOrder = ['Daily','Weekly','Bi-Weekly','Semi-Monthly','Monthly','Quarterly','Semi-Annual','Annual'];

  var groupMap = {};
  var groupOrder = [];
  items.forEach(function(e) {
    var key = getGroupKey(e);
    if (!groupMap[key]) { groupMap[key] = []; groupOrder.push(key); }
    groupMap[key].push(e);
  });

  if (APP.clGroupBy === 'cycle') {
    groupOrder.sort(function(a, b) {
      var ai = cycleOrder.indexOf(a); var bi = cycleOrder.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  } else {
    groupOrder.sort();
  }

  var html = '';
  groupOrder.forEach(function(groupKey) {
    var groupItems = groupMap[groupKey];
    var gCompleted = groupItems.filter(function(e) { return e.equipStatus === 'Completed Today'; }).length;
    var gPct       = Math.round((gCompleted / groupItems.length) * 100);
    var pctCls     = gPct === 100 ? 'green' : gPct > 0 ? 'orange' : 'red';
    var icon       = CL_GROUP_ICONS[groupKey] || '\u2699\uFE0F';
    var gid        = 'clg-' + groupKey.replace(/[^a-zA-Z0-9]/g, '_');

    html += '<div class="cl-group">';
    html += '<div class="cl-group-header" onclick="toggleClGroup(' + "'" + gid + "'" + ')">';
    html += '<span class="cl-group-icon">' + icon + '<\/span>';
    html += '<span class="cl-group-name">' + escHtml(groupKey) + '<\/span>';
    html += '<span class="cl-group-stats">';
    html += '<span class="cl-group-count">' + gCompleted + '\/' + groupItems.length + '<\/span>';
    html += '<span class="cl-group-pct ' + pctCls + '">' + gPct + '%<\/span>';
    html += '<\/span>';
    html += '<span class="cl-group-chevron">\u25BC<\/span>';
    html += '<\/div>';
    html += '<div class="cl-group-items" id="' + gid + '">';
    groupItems.forEach(function(e) { html += renderClItem(e); });
    html += '<\/div>';
    html += '<\/div>';
  });

  body.innerHTML = html;
}

function renderClItem(e) {
  var stCls   = e.equipStatus === 'Completed Today' ? 'completed' : e.equipStatus === 'Overdue' ? 'overdue' : 'pending';
  var stLabel = e.equipStatus === 'Completed Today' ? 'Done' : e.equipStatus === 'Overdue' ? 'Overdue' : 'Pending';

  var iconSvg;
  if (stCls === 'completed') {
    iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"><\/polyline><\/svg>';
  } else if (stCls === 'overdue') {
    iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"><\/circle><line x1="12" y1="8" x2="12" y2="12"><\/line><line x1="12" y1="16" x2="12.01" y2="16"><\/line><\/svg>';
  } else {
    iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"><\/circle><polyline points="12 6 12 12 16 14"><\/polyline><\/svg>';
  }

  var lastInsp = e.lastInspection ? 'Last: ' + formatDateShort(e.lastInspection) : 'Never inspected';

  var metaParts = [];
  if (APP.clGroupBy !== 'area')     metaParts.push(escHtml(e.areaName || ''));
  if (APP.clGroupBy !== 'category') metaParts.push(escHtml(e.category || 'General'));
  if (APP.clGroupBy !== 'cycle')    metaParts.push(escHtml(e.inspectionCycle || ''));

  var metaHtml = metaParts.filter(Boolean).map(function(p, i) {
    return (i > 0 ? '<span class="sep">\u00B7<\/span>' : '') + '<span>' + p + '<\/span>';
  }).join('');
  if (e.assetTag) {
    metaHtml += '<span class="sep">\u00B7<\/span><span style="font-family:monospace">' + escHtml(e.assetTag) + '<\/span>';
  }

  var inspectBtn;
  if (stCls === 'completed') {
    inspectBtn = '<button class="cl-btn-inspect done" disabled>\u2713 Done<\/button>';
  } else {
    inspectBtn = '<button class="cl-btn-inspect" onclick="clInspect(' + "'" + e.equipID + "','" + e.areaID + "'" + ')">Inspect →<\/button>';
  }

  var html = '';
  html += '<div class="cl-item ' + stCls + '">';
  html += '<div class="cl-item-icon ' + stCls + '">' + iconSvg + '<\/div>';
  html += '<div class="cl-item-info">';
  html += '<div class="cl-item-name">' + escHtml(e.equipmentName) + '<\/div>';
  html += '<div class="cl-item-meta">' + metaHtml + '<\/div>';
  html += '<div class="cl-item-last">' + lastInsp + '<\/div>';
  html += '<\/div>';
  html += '<div class="cl-item-right">';
  html += '<span class="cl-item-badge ' + stCls + '">' + stLabel + '<\/span>';
  html += inspectBtn;
  html += '<\/div>';
  html += '<\/div>';
  return html;
}

async function clInspect(equipID, areaID) {
  // Load the area if not already current
  if (!APP.currentArea || APP.currentArea.areaID !== areaID) {
    // Find area from areas list or fetch
    var found = null;
    for (var i = 0; i < APP.areas.length; i++) {
      if (APP.areas[i].areaID === areaID) { found = APP.areas[i]; break; }
    }
    if (!found) {
      // Areas may not be loaded — fetch all for this plant
      try {
        var areas = await gasCall('getAreas', APP.currentPlant.plantID);
        APP.areas = areas || [];
        for (var j = 0; j < APP.areas.length; j++) {
          if (APP.areas[j].areaID === areaID) { found = APP.areas[j]; break; }
        }
      } catch(e) {}
    }
    APP.currentArea = found || { areaID: areaID, areaName: '–' };
  }

  // Find equipment in checklist
  var eq = null;
  for (var k = 0; k < APP.checklist.length; k++) {
    if (APP.checklist[k].equipID === equipID) { eq = APP.checklist[k]; break; }
  }
  if (!eq) { showToast('Equipment not found', 'error'); return; }

  // Build equipWithStatus-compatible object
  APP.currentEquip = {
    equipID:         eq.equipID,
    equipmentName:   eq.equipmentName,
    assetTag:        eq.assetTag,
    inspectionCycle: eq.inspectionCycle,
    category:        eq.category,
    areaID:          eq.areaID,
    equipStatus:     eq.equipStatus,
    lastInspection:  eq.lastInspection
  };

  APP.currentInspection = { details: {} };
  showScreen('form');
  setLoading(true, 'Loading form...');
  try {
    var results = await Promise.all([
      gasCall('getTemplates', equipID),
      gasCall('getTechnicians')
    ]);
    APP.templates    = results[0] || [];
    APP.technicians  = results[1] || [];
    renderInspectionForm();
    setLoading(false);
  } catch(e) {
    setLoading(false);
    showToast('Failed to load form: ' + e.message, 'error');
  }
}

function openReport(areaID, equipID) {
  // GAS sandbox blocks window.location changes, so get the real URL from server
  gasCall('getWebAppUrl').then(function(baseUrl) {
    var url = baseUrl + '?page=report';
    if (areaID)  url += '&areaID='  + encodeURIComponent(areaID);
    if (equipID) url += '&equipID=' + encodeURIComponent(equipID);
    window.open(url, '_blank');
  }).catch(function() {
    // Fallback: try direct navigation
    var url = window.top.location.href.split('?')[0] + '?page=report';
    if (areaID)  url += '&areaID='  + encodeURIComponent(areaID);
    window.open(url, '_blank');
  });
}

  document.getElementById('db-export-btn').style.display = 'none';
  document.getElementById('db-content').innerHTML =
    '<div class="db-spinner-wrap"><div class="loading-spinner"></div>' +
    '<p style="margin-top:12px;color:var(--gray-500)">Loading ' + DBSTATE.year + '...</p></div>';

  try {
    var data = await gasCall('getDashboardReport', DBSTATE.year);
    if (!data || data.error) {
      document.getElementById('db-content').innerHTML = '<p style="color:red;padding:20px">Error: ' + escHtml((data && data.error)||'Unknown') + '</p>';
      return;
    }
    DBSTATE.data = data;
    renderDbDashboard();
    document.getElementById('db-export-btn').style.display = 'flex';
  } catch(e) {
    document.getElementById('db-content').innerHTML = '<p style="color:red;padding:20px">Error: ' + escHtml(e.message) + '</p>';
  }
}

function buildDbYearBtns() {
  var cur = new Date().getFullYear();
  var html = '';
  for (var y = cur - 1; y <= cur + 1; y++) {
    html += '<button class="db-yr-btn' + (y === DBSTATE.year ? ' active' : '') + '" onclick="dbSetYear(' + y + ')">' + y + '</button>';
  }
  document.getElementById('db-year-btns').innerHTML = html;
}

function dbSetYear(y) {
  DBSTATE.year = y;
  DBSTATE.data = null;
  loadDashboardScreen();
}

function renderDbDashboard() {
  if (!DBSTATE.data) return;
  var curMonth = new Date().getMonth();
  var curYear  = new Date().getFullYear();
  var areas    = DBSTATE.data.areas;

  // Group by cycle → plant
  var cycleGroups = {};
  areas.forEach(function(area) {
    if (!cycleGroups[area.cycle]) cycleGroups[area.cycle] = {};
    if (!cycleGroups[area.cycle][area.plantName]) cycleGroups[area.cycle][area.plantName] = [];
    cycleGroups[area.cycle][area.plantName].push(area);
  });
  var cycles = DBSTATE.CYCLE_ORDER.filter(function(c){ return cycleGroups[c]; });

  var html = '';

  cycles.forEach(function(cycle) {
    var cyclePlants = cycleGroups[cycle];
    var plantNames  = Object.keys(cyclePlants).sort();

    html += '<div class="db-section">';
    html += '<div class="db-section-title">';
    html += '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>';
    html += cycle + ' Tasks</div>';
    html += '<div class="db-table-wrap"><table class="db-table">';

    // Header row
    var mhdr = buildDbHeader(curMonth, curYear);
    html += '<thead>' + mhdr + '</thead><tbody>';

    var rowNum = 1;
    plantNames.forEach(function(plantName) {
      html += '<tr class="db-phase-row"><td colspan="16">' + escHtml(plantName) + '</td></tr>';
      cyclePlants[plantName].forEach(function(area) {
        html += '<tr class="db-data-row">';
        html += '<td class="db-no">' + rowNum++ + '</td>';
        html += '<td class="db-loc">' + escHtml(area.areaName) + '</td>';
        html += '<td class="db-typ"><span class="db-badge-type">Internal</span></td>';
        html += '<td class="db-cyc">' + escHtml(area.cycle) + '</td>';

        area.months.forEach(function(mo, mi) {
          html += '<td class="db-mon" onclick="openDbModal(' + "'" + area.areaID + "'," + mi + ')">';
          if (mo.status === 'upcoming') {
            html += '<div class="db-cell s-upcoming"><span class="db-cell-icon up">&mdash;</span></div>';
          } else if (mo.status === 'completed') {
            html += '<div class="db-cell s-completed"><span class="db-cell-icon ok">&#10003;</span></div>';
          } else if (mo.status === 'none' || mo.status === 'partial') {
            html += '<div class="db-cell s-none"><span class="db-cell-icon bad">&#10007;</span></div>';
          } else {
            html += '<div class="db-cell s-upcoming"><span class="db-cell-icon up">&mdash;</span></div>';
          }
          html += '</td>';
        });
        html += '</tr>';
      });
    });

    html += '</tbody><tfoot>' + mhdr.replace(/<thead>/g,'').replace(/<\/thead>/g,'') + '</tfoot>';
    html += '</table></div></div>';
  });

  if (!cycles.length) html = '<div style="text-align:center;padding:40px;color:var(--gray-400)">No data for ' + DBSTATE.year + '</div>';
  document.getElementById('db-content').innerHTML = html;
  document.getElementById('db-title').textContent = 'Factory Inspection Record — ' + DBSTATE.year;
}

function buildDbHeader(curMonth, curYear) {
  var row = '<tr>';
  row += '<th class="db-col-no">NO.</th>';
  row += '<th class="db-col-loc">LOCATION</th>';
  row += '<th class="db-col-typ">TYPE</th>';
  row += '<th class="db-col-cyc">CYCLE</th>';
  DBSTATE.MONTHS.forEach(function(m, i) {
    var isCur = (i === curMonth && DBSTATE.year === curYear);
    row += '<th class="db-col-mon' + (isCur ? ' db-cur-month' : '') + '">' + m + '</th>';
  });
  row += '</tr>';
  return row;
}

// MODAL
function openDbModal(areaID, monthIdx) {
  var modal = document.getElementById('db-modal');
  modal.style.display = 'flex';
  document.getElementById('db-m-title').textContent = 'Loading...';
  document.getElementById('db-m-sub').textContent   = '';
  document.getElementById('db-m-pill').textContent  = '';
  document.getElementById('db-m-stats').innerHTML   = '';
  document.getElementById('db-m-grid').innerHTML    = '<div style="text-align:center;padding:20px"><div class="loading-spinner"></div></div>';

  gasCall('getAreaMonthDetail', areaID, DBSTATE.year, monthIdx).then(function(data) {
    if (!data || data.error) { document.getElementById('db-m-title').textContent = 'Error'; return; }

    var areaName = areaID;
    if (DBSTATE.data) DBSTATE.data.areas.forEach(function(a){ if (a.areaID === areaID) areaName = a.areaName; });

    document.getElementById('db-m-title').textContent = areaName;
    document.getElementById('db-m-sub').textContent   = DBSTATE.MONTHS_FULL[monthIdx] + ' ' + DBSTATE.year + ' — ' + data.cycle;

    var missed = data.requiredCount - data.completedCount;
    var pct    = data.requiredCount > 0 ? Math.round(data.completedCount / data.requiredCount * 100) : 0;
    document.getElementById('db-m-pill').textContent = data.completedCount + ' / ' + data.requiredCount + ' days completed';

    // Stats - use DOM manipulation instead of HTML strings
    var statsEl = document.getElementById('db-m-stats');
    statsEl.innerHTML = '';
    var statItems = [
      { val: data.completedCount, lbl: 'Completed', color: '#16a34a' },
      { val: missed,              lbl: 'Missed',    color: '#dc2626' },
      { val: data.requiredCount,  lbl: 'Required',  color: '#1f2937' },
      { val: pct + '%',           lbl: 'Complete',  color: pct === 100 ? '#16a34a' : '#dc2626' }
    ];
    statItems.forEach(function(s) {
      var card = document.createElement('div');
      card.style.cssText = 'background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb;padding:12px;text-align:center';
      card.innerHTML = '<div style="font-size:22px;font-weight:700;color:' + s.color + '">' + s.val + '</div>' +
        '<div style="font-size:11px;color:#6b7280;margin-top:2px;font-weight:600">' + s.lbl + '</div>';
      statsEl.appendChild(card);
    });

    // Day grid
    var gridEl = document.getElementById('db-m-grid');
    gridEl.innerHTML = '';
    var DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    DOW.forEach(function(d) {
      var hdr = document.createElement('div');
      hdr.style.cssText = 'text-align:center;font-size:10px;font-weight:700;color:#9ca3af;padding:4px 0';
      hdr.textContent = d;
      gridEl.appendChild(hdr);
    });

    // Empty offset
    var firstDow = new Date(DBSTATE.year, monthIdx, 1).getDay();
    for (var i = 0; i < firstDow; i++) {
      gridEl.appendChild(document.createElement('div'));
    }

    data.days.forEach(function(d) {
      var cell = document.createElement('div');
      var bg = 'white', border = '#e5e7eb', numColor = '#d1d5db', icon = '', techStr = '';

      if (d.required) {
        if (d.future) {
          bg = '#f9fafb'; border = '#f3f4f6'; numColor = '#9ca3af';
          icon = '<div style="font-size:12px;color:#d1d5db;margin-top:3px">&#9679;</div>';
        } else if (d.done) {
          bg = '#dcfce7'; border = '#86efac'; numColor = '#16a34a';
          icon = '<div style="font-size:16px;font-weight:700;color:#16a34a;margin-top:3px">&#10003;</div>';
          if (d.techs && d.techs.length) {
            techStr = '<div style="font-size:9px;color:#16a34a;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
              escHtml(d.techs[0].substring(0,8)) + '</div>';
          }
        } else {
          bg = '#fee2e2'; border = '#fca5a5'; numColor = '#dc2626';
          icon = '<div style="font-size:16px;font-weight:700;color:#dc2626;margin-top:3px">&#10007;</div>';
        }
      }

      cell.style.cssText = 'border-radius:8px;padding:7px 4px 6px;text-align:center;border:1.5px solid ' + border + ';background:' + bg;
      cell.innerHTML = '<div style="font-size:13px;font-weight:700;color:' + numColor + '">' +
        String(d.day).padStart(2,'0') + '</div>' + icon + techStr;
      gridEl.appendChild(cell);
    });
  }).catch(function(e) {
    document.getElementById('db-m-title').textContent = 'Error: ' + escHtml(e.message);
  });
}

function closeDbModal() {
  document.getElementById('db-modal').style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (e.target.id === 'db-modal') closeDbModal();
});


// CSV Export
function dbExportCSV() {
  if (!DBSTATE.data) return;
  var areas = DBSTATE.data.areas;
  var rows  = [];
  rows.push(['Factory Inspection Record — ' + DBSTATE.year]);
  rows.push([]);
  rows.push(['NO.','LOCATION','TYPE','CYCLE'].concat(DBSTATE.MONTHS));

  var cycleGroups = {};
  areas.forEach(function(area) {
    if (!cycleGroups[area.cycle]) cycleGroups[area.cycle] = {};
    if (!cycleGroups[area.cycle][area.plantName]) cycleGroups[area.cycle][area.plantName] = [];
    cycleGroups[area.cycle][area.plantName].push(area);
  });

  DBSTATE.CYCLE_ORDER.filter(function(c){ return cycleGroups[c]; }).forEach(function(cycle) {
    rows.push([cycle + ' Tasks']);
    var rowNum = 1;
    Object.keys(cycleGroups[cycle]).sort().forEach(function(plantName) {
      rows.push(['',plantName]);
      cycleGroups[cycle][plantName].forEach(function(area) {
        var row = [rowNum++, area.areaName, 'Internal', area.cycle];
        area.months.forEach(function(mo) {
          if (mo.status === 'upcoming')   row.push('—');
          else if (mo.status === 'completed') row.push('✓ ' + mo.completed + '/' + mo.total);
          else {
            var cell = '✗ ' + mo.completed + '/' + mo.total;
            if (mo.missedDays && mo.missedDays.length) cell += ' | Missed: ' + mo.missedDays.join(', ');
            row.push(cell);
          }
        });
        rows.push(row);
      });
    });
    rows.push([]);
  });

  var csv = rows.map(function(row) {
    return row.map(function(cell) {
      var s = String(cell===null||cell===undefined?'':cell);
      if (s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0) s='"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(',');
  }).join('\r\n');

  var blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='Inspection_Record_'+DBSTATE.year+'.csv'; a.click();
  URL.revokeObjectURL(url);
}
